front:
  text: 太上感應篇集注太上感應篇集注序儒者之學以求誠也而誠貫乎學之終始傳曰不誠無物况學之大乎六籍皆勸善禁惡導吉避凶之書學者服習其文至於老死鮮有明於心而行於身者則亦不誠之故而已矣夫天之與人一誠之所為也故舉念而天監焉出言而天聽焉行事而天視焉禍福之報各以類應亦惟其誠而已孔子曰善不積不足以成名惡不積不足以滅身董子曰善惡之極乃與天地流通而往來相應夫善惡積之而至於極則誠矣誠安有不感感安有不應孟子曰至誠而不動者未之有也不誠未有能動者也動即感應之謂也古今言感應者未有深切著明於此者也余觀太上篇中既列善惡之目而於終篇則要之以語視行三者夫一日之間三者皆備可謂誠矣而又積之至於三年則誠之至矣禍福之應豈自外來乎夫無妄之福無妄之禍君子無所容心焉若夫致自己者正當取之以考其善與不善誠與不誠如是則禍福皆修身之助矣世之諱言之者竊以為過矣一日在內直見查淡遠宫詹手一編專視而貌肅若神明與俱者就而視之則感應篇集注不書撰人名氏其箋釋則先發明義理而後證以事實或更引他說以暢之其文約而不漏詳而不雜切近而顯明用之警世動俗可以勉進於正而懲創其邪僻與六籍所載勸善禁惡導吉避凶之指無異焉而淡遠好之如此其誠由是道也暗室屋漏出王游衍皆若昊天鬼神之降監其有裨於吾儒立誠之學者豈淺鮮哉既嘉是書之可以警世動俗也遂與淡遠共捐資以付剞劂淡遠屬余標其大指書於簡端云龍集康熙四十又五年六月朔日丁亥澤州陳廷敬書太上感應篇太上曰禍福無門惟人自召善惡之報如影隨形是以天地有司過之神依人所犯輕重以奪人算算減則貧耗多逢憂患人皆惡之刑禍隨之吉慶避之惡星災之算盡則死又有三台北斗神君在人頭上録人罪惡奪其紀算又有三尸神在人身中每到庚申日輒上詣天曹言人罪過月晦之日竈神亦然凡人有過大則奪紀小則奪算其過大小有數百事欲求長生者先須避之是道則進非道則退不履邪徑不欺暗室積德纍功慈心於物忠孝友悌正己化人矜孤恤寡敬老懷幼昆蟲草木猶不可傷宜憫人之凶樂人之善濟人之急救人之危見人之得如己之得見人之失如己之失不彰人短不衒己長遏惡揚善推多取少受辱不怨受寵若驚施恩不求報與人不追悔所謂善人人皆敬之天道祐之福祿隨之衆邪遠之神靈衛之所作必成神仙可冀欲求天仙者當立一千三百善欲求地仙者當立三百善苟或非義而動背理而行以惡為能忍作殘害陰賊良善暗侮君親慢其先生叛其所事誑諸無識謗諸同學虛誣詐僞攻訐宗親剛强不仁狠戾自用是非不當向背乖宜虐下取功諂上希旨受恩不感念怨不休輕蔑天民擾亂國政賞及非義刑及無辜殺人取財傾人取位誅降戮服貶正排賢淩孤逼寡棄法受賂以直為曲以曲為直入輕為重見殺加怒知過不改知善不為自罪引他壅塞方術訕謗聖賢侵淩道德射飛逐走發蟄驚棲填穴覆巢傷胎破卵願人有失毁人成功危人自安減人自益以惡易好以私廢公竊人之能蔽人之善形人之醜訐人之私耗人貨財離人骨肉侵人所愛助人為非逞志作威辱人求勝敗人苗稼破人婚姻苟富而驕苟免無耻認恩推過嫁禍賣惡沽買虛譽包貯險心挫人所長護己所短乘威迫脅縱暴殺傷無故剪裁非禮烹宰散棄五穀勞擾衆生破人之家取其財寶決水放火以害民居紊亂規模以敗人功損人器物以窮人用見他榮貴願他流貶見他富有願他破散見他色美起心私之負他貨財願他身死干求不遂便生呪恨見他失便便說他過見他體相不具而笑之見他才能可稱而抑之埋蠱厭人用藥殺樹恚怒師傅抵觸父兄强取强求好侵好奪虜掠至富巧詐求遷賞罰不平逸樂過節苛虐其下恐嚇於他怨天尤人訶風罵雨鬬合爭訟妄逐朋黨用妻妾語違父母訓得新忘故口是心非貪冒於財欺罔其上造作惡語讒毁平人毁人稱直罵神稱正棄順效逆背親向疏指天地以證鄙懷引神明而鑒穢事施與後悔假借不還分外營求力上施設淫欲過度心毒貌慈穢食餧人左道惑衆短尺狹度輕稱小升以僞雜真採取姦利壓良為賤謾驀愚人貪婪無厭呪詛求直嗜酒悖亂骨肉忿爭男不忠良女不柔順不和其室不敬其夫每好矜誇常行妬忌無行於妻子失禮於舅姑輕慢先靈違逆上命作為無益懷狹外心自呪咒他偏憎偏愛越井越竈跳食跳人損子墮胎行多隱僻晦臘歌舞朔旦號怒對北唾涕及溺對竈吟詠及哭又以竈火燒香穢柴作食夜起裸露八節行刑唾流星指虹霓輒指三光久視日月春月燎獵對北惡罵無故殺龜打蛇如是等罪司命隨其輕重奪其紀算算盡則死死有餘責乃殃及子孫又諸橫取人財者乃計其妻子家口以當之漸至死喪若不死喪則有水火盜賊遺亡器物疾病口舌諸事以當妄取之直又枉殺人者是易刀兵而相殺也取非義之財者譬如漏脯救饑鴆酒止渴非不暫飽死亦及之夫心起於善善雖未為而吉神已隨之或心起於惡惡雖未為而凶神已隨之其有曾行惡事後自改悔諸惡莫作衆善奉行久久必獲吉慶所謂轉禍為福也故吉人語善視善行善一日有三善三年天必降之福凶人語惡視惡行惡一日有三惡三年天必降之禍胡不勉而行之康熙四十五年丙戌五月朔奉持弟子海寧查升齊沭敬書
