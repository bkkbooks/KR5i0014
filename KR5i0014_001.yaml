body:
  text: 太上垂訓感應之篇日誦一遍滅罪消愆受持一月福祿綿綿行之一季七祖升天久行不怠夀命長延天神恭敬名列諸仙太極真人讚秋浦曹曰瑛敬書重刋道藏輯要太上感應篇集注太上者道門至尊之稱也由此動彼謂之感由彼答此謂之應言善惡感動天地必有報應也太上曰禍福無門惟人自召此二句合下二句為一節乃一篇之綱領也蓋言天地無私因物付物是以禍之福之常因人之善惡本無一定之門今人求福則萌僥幸之念而不知福緣善生遇禍則起怨尤之私而不知禍因惡致善惡實由人自作則禍福豈不由人自召乎太上恐人不肯反求諸已故首揭己召二字以示人也大抵一念起處即分善惡善惡既分禍福即殊昔衛仲達初為館職被攝至冥冥官命吏呈善惡二録惡録盈庭善録才如筋小索稱稱之小軸乃能壓惡録官曰君可出矣衛曰某年未四十過惡何得如是之多乎官曰一念不正此即書之不待犯也衛曰軸中所書何事官曰朝廷嘗興大工修三山石橋君上疏止之此疏稿也衛曰某雖言朝廷未從何益官曰君此念已在萬民向使聽從則善力更大矣奈惡念太多力已減半不可復望大拜後果止吏部尚書噫仲達止是空念尚損合作宰相之福况本自福薄又多實犯者乎李昌齡曰禍福由自召亦由自轉轉念得則宿業可破善根可培矣是在人之反求也善惡之報如影隨形善惡感也禍福應也此感彼應毫髮不爽如人有形則有影也佛說衆生造業其報有三一現報今生造業今生受二生報今身造業後身受三後報今生造業更一生受此通三世論也儒家亦言之曰子孫保之曰苟為善後世子孫必有王者亦通三世論也今但據目前某人善而得禍某人惡而得福豈通論乎曰然則形影之喻其說何也曰此言其必然也非定言其速也即影之肖形亦有遠近影遠則大影近則小報之遠近寧獨不然速則報輕遲則報重或惡業多則先受惡報或善業多則先受善報或善心退轉則又因福而得禍或惡念改悔則又因禍而得福雖是種種不一總之一定不移故曰如影隨形是以天地有司過之神依人所犯輕重以奪人算自此至算盡則死為一節言人之一生日夜時刻上下四旁皆有鬼神鑒察也蓋神居幽暗人居顯明神嘗見人人不見神譬如人居幽暗能見顯明人居顯明則不能見幽暗也因人之不見神而遂謂之無神可乎中誡經云皇天雖高其應在下后土雖卑其應在上人處其中凡有言動天地皆知故天有三官五帝地有五嶽諸司日夜巡行察人過犯其中又有舉意司專主關達人之事始事始者人之起念處也凡此皆謂之司過之神不言司功言司過者非不記功以人之所為過多功少故止言司過也聰明正直謂之神聰明則無遺漏正直則無委曲是以輕重之間各得其當犯輕者奪算亦輕犯重者奪算亦重算謂夀數也五福以夀為先故罰過以奪算為首算減則貧耗多逢憂患財祿有長有消厯境有安有危無非鬼神主之既已奪其算矣祿料寧得獨豐故貧耗福氣安得獨厚故憂患靑帝之訓曰行善如春園之草不見其長日有所增行惡如磨刀之石不見其損日有所虧按虧損二字即貧耗憂患之根也人皆惡之既為減算之人則必為人厭惡玉樞經曰斬神除魄使之癲倒人所厭惡人所嫌害今但恨人之欺我豈知乃天奪吾鑑令不逢世乎刑禍隨之諺云人非欺心不遭官刑人無隱過不遭橫禍彼罰算之人能免此乎隨之有跟定不離之義吉慶避之惠迪乃吉積善斯慶一經減算便是有罪之人吉化為凶慶轉為禍若或避之也惡星災之吉慶既避則必有惡星為災蓋惡自人為星因災之非星惡也世人不明此義而徒仗師巫禳解順星何其不察之甚乎算盡則死自依人所犯輕重至此句皆太上苦口垂誡之詞言減算不已畢竟至此真可哀也夫浮生短世人夀幾何今日以某事減算若干明日以某事減算若干減之又減以至於無則死期至矣一死之後更有三惡險道或為畜生或為餓鬼或墮地獄又非是一死便能了帳也又有三台北斗神君在人頭上録人罪惡奪人紀算此一節言人之一身行住坐卧皆有鬼神鑒察也三台有六星上台司命中台司中下台司録上帝署為天曹主人生死夀夭人有三魂上應三台北斗乃紫極都曹精應玉淸尤位之至尊者也業報因緣經有云七星之氣常結為一星在人頭上去頂三寸其人為善則光大而明其人為惡則光小而暗又有三尸神在人身中每到庚申日輒上詣天曹言人罪過此一節言人之一心幾微萌動皆有鬼神鑒察也三尸亦名三彭上尸名彭踞中尸名彭躓下尸名彭蹻每於庚申日乘人寐時上至天曹言人罪過所謂心口意語鬼聞人聲者三尸其最也庚申屬金乃天曹斷決之日故修真之家遇此日則守夜不寐然非淸心寡欲檢身克已即何能己三尸諱之程子霄詩云不守庚申更不疑此心常與道相依帝天已自知行止任爾三彭說是非此言誠見道者矣月晦之日竈神亦然此一節言人之一家動靜居處皆有鬼神鑒察也月晦之日月盡之日也竈為司命之神司人一家之命於人朝夕善惡無微不察每至月終輒上詣天曹奏之最能旋轉禍福凡人有過大則奪紀小則奪算此一節總結上文言鬼神鑒察如是是以大小之過皆不能掩而奪紀奪算確乎其不誣也十二年為一紀百日為一算經云人之受生所得之算皆紀在諸天太上敕諸神巡行考校三日一言十日一奏百日一結若修善立功便可延年萬一造罪立見減削唐婁師德為左驍衛郎將後遷納言一日晨起入朝忽見星官謂曰汝曾誤殺二命罪當奪紀星光將盡矣言訖不見是日隨即神昏不能入朝因謂侍者曰我一生謹愼只因誤殺二命今遂早死一紀未幾卒此大過奪紀之證也宋符仲信白手起家年三十五因病入冥遇故舊數人呼曰恩公何為至此相與拜求一吏吏曰此人本合飢寒以好施故能起家夀本五十九以不燒香睡起遲今將削盡數人謂此二事皆小過吏曰不燒香即是無敬奉天地心睡起遲即是有多淫之意豈為小過數人相顧嘆曰厚德如符公尚以此奪算况其他乎符驚寤因自述其說以告人此小過奪算之證也其過大小有數百事欲求長生者先須避之此節承上文而言過大奪紀過小奪算是過無大小皆害我者也見害不避名為真癡太上憫之故特指人以避之之路數百事如篇中自非義而動以至殺龜打蛇皆其事也又因奪紀奪算之言而專及求長生者以見造命延年之訣莫切於此其實天下無人不在過中無人不當避過若欲求長生者尤當修真鍊性使身心淨若明珠即纎翳微塵亦不可有耳先須二字又啓下文千善百善之義蓋未立善先須避過既避過更須立善也是道則進非道則退此一節是綱下二段是目不履邪徑以下是道之目也非義而動以下非道之目也道猶大路也坦平正直即是道也崎嶇邪僻即非道也進退兩途決之於已有趨吉避凶之義趙淸獻公嘗曰吾晝之所為夜必焚香告之於天不敢告者不敢為也蘇黃門書陰君之言曰晝之所為夜必記之於紙不可記者不可為也二公所言即是此義不履邪徑小路為徑邪者不正也動履不正皆從心起心正則步履不期正而正矣趙抃帥蜀時有妓戴杏花公偶戲曰髻上杏花真有幸妓應聲曰枝頭梅子豈無媒至晚公使一老兵呼妓遲遲不至公忽厲聲呼曰趙抃不得無禮急令人召回老兵老兵乃自幕後出曰某實未往某事相公最久相公邪徑分毫不染知今日之事不過一時此念便息耳此將履邪徑一念能改者也陳良謨遊學廣德本庠張掌教謂公曰歸安武大尹今秋必入簾吾引爾往拜其門場中必當留意公唯而出私念窮通有命進不出正識者所鄙遂托辭不往而是嵗恰中武公房內假使當時一拜則彼此俱無以自明矣此未履邪徑一念能持者也夫邪徑二字所包極廣路頭略差便是大錯一朝失足遺恨千古可不愼乎不欺暗室暗室者人所不見不聞之處也經云人間私語天聞若雷暗室虧心神目如電孰謂暗室遂可欺乎宋黃靖國為儀州判官一夕被攝至冥冥官曰卿在儀州有一美事曾知之乎命吏取薄示之乃醫士聶從志某年月日在華亭楊宅行醫楊妻李氏淫奔從志從志力拒得免上帝賜聶從志延夀一紀子孫三世登科靖國既還說與從志從志駭曰此事妻子亦未嘗與言不意已書陰籍此不於暗室欺人色者也蒲州楊溥父為人忠信不欺業商淮揚一日有陝客事急回家密以千金寄公處三年不返公將金埋花盆中植時卉於上遣人關中訪之本商巳死止生已子公呼至以金與之其子疑不敢領公曰此汝父所寄爾何必辭其子叩謝携去後生溥為太師孫俊民戶部尚書曾孫元祥翰林檢討此不以暗室欺人財者也善乎王梅溪詩曰室明室暗兩奚疑方寸長存不可欺莫問天高鬼神惡要須先畏自家知人能於獨知處時時檢點又何欺之與有積德纍功存諸心曰德見諸事曰功由少至多曰積由卑至高曰纍德不積不崇功不纍不大漢先主誡其子曰勿以善小而不為此正積纍之說也今人不肯行善動云做好事那得錢使豈知積德纍功自有不必用錢者乎鎮江太守葛繁嘗語人曰始豫日行一利人事或二或三或數四今四十餘年未嘗少廢問何為利人事公指座間踏子曰且如此物置不正則䠞人足吾為正之若人渴與之杯水皆利人事也無論貧富皆可行惟悠久乃有益此則貧賤家所當效法者也然有力之家亦不得以此借口宜興吳頤山無子有李生獻種子方曰方今嵗荒殆天假公以會也乃列數事一貧民錢糧兩數以下代納二輕犯追贓贖罪者代完三各城門設粥廠四族屬姻黨貧者不時餽遺五村落窮民親自給粟六置藥療疫七掩骼八造橋九置義莊十助學田吳公欣然行之後連舉三子此又富貴家所當效法者也大約力到處行好事力未到處常行好心勿務名勿辭難勿始勤終怠則所云一千三百善日行一事只須四年三百善日行一事只須一年人亦何憚而不為乎慈心於物慈者萬善之本誠欲積德纍功不獨愛人兼當愛物第物類至殊易多忽略故太上於此先言之大藏經曰人不殺生得長夀報又云人家小兒頑戲凡蠅蝶鳥雀之類切宜禁戒非惟傷生且熾其殺心長大不知仁恕又云人於行住坐卧間見一切衆生投身死地當方便救護使得生全又經云燈燭熖上別有微細衆生吞食其光人氣一吹隨吹即死故諸佛戒人勿以口氣吹滅燈燭又云水中有微細蟲人不能見須以囊濾水方可飮諸聖於微細物命切切護念如此况飛走之大者乎昔陶隱君已獲道要不得上升託桓闓訪之三日桓君來告曰君所修本草以虻蟲水蛭為藥功雖及人而害及物命以此淹留耳隱君復以草木可代物命者另著本草三卷行世遂得仙去噫隱君以救人之故而傷害物命尚且不免有過今人害物命而恣饜口腹視此又何如耶忠孝履茲土者人孰無君具此身者人皆有親無君無親是與禽獸等矣故立善多端莫先忠孝即成仙證佛亦何嘗不根基於此東鄉司命曰人雖有應仙格當登仙品然必多厯年所始得漸進惟大忠大孝今日謝世明日便補仙階釋家則曰皇王水土不敢忘也又謂人不先供養父母而有施者是名惡人孰謂二氏之學為不談忠孝者耶然所謂忠孝者惟在隨分自盡不必犯難死節然後為忠不必割股割肝然後為孝居官有居官之忠士庶亦有士庶之忠富貴有富貴之孝貧賤亦有貧賤之孝此中義類不可勝舉即古來賢哲芳規亦難槩述姑引一二以見大凡李善南陽李元家奴也元家染疫盡死止遺一孫名續未滿周嵗諸奴咸欲謀殺分其財産善乃潛負續入山中親自哺養推燥居濕備嘗辛勤續雖孩稚奉之不異長君每出入間必跪告乃行至十餘嵗出山告縣令鍾離意意捕諸奴悉殺之後朝廷聞之拜善及續俱為太子舍人復遷善為日南太守道經南陽至元塜一里外即脫朝服衣故衣持鋤去草拜墓哭甚哀自執爨以祀曰主君夫人善在此數日乃去以厮養之卒尚知盡忠如此彼居官食祿儼然稱縉紳先生者又可自恕乎楊一武進墟橋人也行乞養父母所得食雖極餓不敢嘗必先以奉親有酒則跪進跳躍起舞唱山歌以悅之如是者十年鄉人感其孝與之金雇為傭不受曰吾親烏可一日離也父母相繼死乞得棺脫已衣殮之己嚴寒赤身弗恤葬於野即露宿棺旁日夜哀號嵗時拜獻未嘗缺失以乞丏之義尚知孝親如此彼舊家子弟力量少能自給者又可自恕乎友悌兄愛弟曰友弟敬兄曰悌兄弟之生情同手足即有繼有庶其原止是一人薄待兄弟便是薄待父母矣禮曰父母之所愛亦愛之真知重父母者固未有薄待兄弟者也吳興富翁莫氏老年私一婢有娠懼其嫗姤遂遣嫁一賣羹者已而生男甫十嵗翁遂死里中羣小指為奇貨因語其婢曰汝子孰不知莫氏子其家産應有分胡不歸取之不聽則訟之耳因作一孝服被其子使往且戒曰至靈前拜畢亟出我輩俟汝至屋旁即告官其子如其教入其家哭且拜家內駭然嫗罵欲逐之莫長子亟前曰不可遂抱持問曰汝非賣羹子乎曰然遂引拜其母曰此汝母吾乃長兄汝當拜遍指家人曰此為汝長嫂此為次兄次嫂當拜又指云此為汝長姪此為次姪汝當受拜拜畢曰汝當在此執喪勿去即命櫛沐去故衣易新衣使與諸兄弟同寢處又呼其生母至許以月廩嵗衣羣小俟久不出計遂大阻夫此子一敦友愛內全先人之體外息羣小之禍不可為分別異母者勸乎然世亦有同胞共乳而兄弟往往參商者揆厥所由匪止一端而爭較財物尤其最著不知財物易求兄弟難得朋友相洽尚通有無何况兄弟昔趙彥霄兄彥雲好遊生業廢半彥霄諫不聽遂求析箸五年而兄蕩費已盡除夕彥霄置酒語兄曰弟初無分爨意以兄不節敬為兄守先業之半亦足以供朝夕請歸仍主家政即取分劵焚之付以管鑰更出所蓄償諸負者次年彥霄與長子俱鄉薦登第今人重財物輕手足其食報亦可知已法昭禪師偈曰同氣連枝各自榮些些言語莫傷情一回相見一回老能得幾時為弟兄兄弟同居忍便安莫因毫末起爭端眼前生子又兄弟留與兒孫作樣看此語最堪感悟正已化人表正影直已正人化不能化人是已未正耳自不履斜徑至此皆屬正已自此至與人不追悔皆屬化人化人亦正已中事也陳白沙嘗舟行遇盜盡劫財物白沙居舟尾呼曰我有行李在此可取去盜問為誰答曰我陳獻章盜訝曰小人無知驚動君子舟中之人即公友也忍取其財乎悉還而去海陵王心齊從陽明先生講學以良知為宗一日盜至其家公亦與之講良知羣盜譁曰如吾輩者良知安在公曰汝試去衣良知便露羣盜因去衣惟一褲相顧不去公曰此即良知所在也汝不去此是有恥心此心本有謂之良知因為之反覆曉喻羣盜感悟而去夫人之難化莫如盜而兩公俱能格其非心豈非正已人自化耶苟不知正已專務化人雖至親豈能相信矜孤恤寡孤兒寡婦世之窮而無告者我能矜之恤之是以補天地生成之不逮矣閬州陳喻言已度世為真武部下判官一日隨真武下降忽聞哭聲俯聽乃其妻也因懇真君求通音信允令寫書差直符送下書中示其妻以始末且囑曰撫育諸孤保守門戶噫嘻已得度世者繫念尚爾况未得度世者耶是矜孤恤寡不但植厚德於人間兼可慰幽魂於地下此處關係陰騭更是不小敬老老者閲世久更事多衮衮少年無限淪喪龎眉皓首獨保康强可不敬乎語云敬老得老四字實有至理昔楊億以弱冠中殿元與周翰朱昻同在禁掖時二公皆老楊輕侮之翰曰君莫侮我老老亦終留與君昻搖手曰莫與莫與恐後人侮之億果方壯而卒抑聞老吾老因以及人之老垂白在堂不知尊禮而泛云敬老秖成悖德無怪乎逆子頑孫踵踵相繼也原穀有祖年老父母厭其苛察命穀作一輿送祖至別室穀泣諫不聽隨收輿歸父曰爾焉用此曰留此以待父老耳父感悟即迎祖歸養卒成孝子此事雖奇可以為鑒懷幼幼者位卑力弱苟挾長憑陵則彼無利口辨是非又無强力較勝負可憫孰甚故吾之幼宜加意撫惜人之幼亦宜撫惜之也昔楊翥官宫僚出入止乘一驢鄰翁老而得子恐家驢驚之遂賣驢徒行懷幼如楊公者尚何分人我耶由此推廣字養之仁益無窮盡葉夢得云子在許昌嵗大水流殍無數奏發常平賑濟活十餘萬人惟遺棄小兒無法救之偶問左右無子者何不收養曰願子者固有頗患嵗豐人長而父母來認耳因為設法凡因災傷遺棄小兒父母不得復子當其棄置時恩義已絶收之為恩更多遂作空劵數千印給內外凡得兒者自言所從來明於劵略為籍記使以時上數收多者賞且分常平餘粟量給貧者為資事定稽劵凡三千八百人此亦臨民者所當知也又云兵興以來有伏匿林莽者多因兒啼聞聲遂得其處不免被害於是避賊者率棄嬰兒不顧有教為綿毬置兒口中略使滿口而不閉氣少蓄甘草末繫時量水漬使咀其味兒口中有此自不作聲綿軟又不傷口因鏤板以揭道上已酉冬賊自江西犯饒信居民空城去而嬰兒得全活者甚多此又遇變者所當知也遺棄嬰兒不獨災傷時有之即太平豐年亦然蓋貧家不能舉子多置路傍或厭兒女繁者甘心棄置甚有私胎分娩者溺死盆中其為慘毒更甚邇有揚州居民蔡璉建立育嬰社募衆協舉為利甚溥其法以四人共養一嬰每人月出銀一錢五分遇路遺子女收至社所有貧婦領乳者月給工食銀六錢每逢月望驗兒給銀考其肥瘠以定賞罰三年為滿待人哺養此法不獨恤幼又兼賑貧免一時溺嬰之慘興四方好善之心世間功德莫此為盛凡城邑村鎮皆可倣此行之為官司者循此勸導各方利濟更易宏也時陳曼仙致政家居為之刋定社規極精極詳名之曰育嬰編昆蟲草木猶不可傷前言慈心於物意已盡矣此二語啓下文愛人之意蓋言昆蟲物之至微者也草木物之無情者也存心愛物者猶且不忍傷之况於人乎宜憫人之凶宜字直貫下十六句乃承上二語而言也凶者凶惡之凶何龍圖曰凡人惡之初作只緣一念之差未必不可勸禁惡之既熾猶有一念之明未必不可救解但世每拒絶如仇而渠亦趨死如鶩彼固不肖我亦非賢故邵子曰聞人之惡如負芒刺愛人猶己者自如此矣周文襄公忱閲一死獄欲活之無由反覆不安形於愁嘆使吏抱成案讀之至數萬言背手立聽至一處忽點首曰幸有此可生乃出其罪此真能憫人之凶者樂人之善人發善願天聞若雷諸佛護念上真主持奈何世人妄行嫉妬假使妬不行彼之善自若也即使妬行而彼之善愈高矣徒壞心術於已何利苟能樂善不獨誘掖奬勸善自我成者為吾善也即彼之善已成吾能播揚之推引之使有善者固而堅信無善者亦聞而興起此便是無量功德矣誰謂善之在人於我無與哉昔范文正公卜居錢氏園林陰陽家謂此地當踵生公卿公曰吾家獨貴孰若使吳中之士咸教育於此遂奏以其地為學宫此真能樂人之善者濟人之急人之急不止一端疾病則醫藥急死喪則殯葬急饑乏則衣食急如此之類不可悉數但當各隨其急濟之宋鄧元發知鄆州時淮南京東大饑元發慮流殍日聚必且蒸為疫癘先相度城外空地召諭宦家富室使出力為席舍一夕之內成二千五百餘間井竈器用無一不具民至如家遇疾即治全活五萬人後為龍圖閣學士年八十五無疾而終張彥明善醫貧者不受錢或反周之富者以錢求藥不問多寡必多與藥人有請者必速往不計遠近嘗雪夜赴人延請家人止之曰彼病人輾轉牀榻可緩須臾乎一夕城中火起周回燒盡其居獨存後子孫俱貴顯濟人疾病之急者鑒此劉岑守維揚有故人子以父未葬為請詰以所費幾何子厯厯具陳岑曰且留相伴密使幹吏齎金往辦之兩月吏回使與說曰喪已舉矣子可速歸岑語人曰此子氣太爽得錢必不以親為重不若留此而畢其事先友之志酬矣浮梁寧崇禮常造棺襯施人享夀至八十沒後託夢與家人曰我生平多做屋定與人濟人之急坐此積纍陰功慶流子孫可說與十四郎明年必發解自此接續登科者不絶十四郎名謙光次年果發解自此無虛榜濟人死喪之急者鑒此范忠宣知慶州嵗大饑公請發倉賑濟郡官皆曰須奏乃可公曰人不食七日則死奏豈能及乎諸君但勿憂有罪吾當自坐即日發倉賑之揚州興化韓樂吾家素貧適嵗饑典質俱盡一日正餘米二升五合有同社友絶糧欲分半以贈妻曰如明日何樂吾曰吾等是明日死彼却是今日死遂分贈之濟人饑乏之急者鑒此救人之危元帝垂訓曰凡人在顚沛患難之中善用一言解救上資祖考下廕兒孫又曰推人與扶人都是一般手陷人與讚人都是一般口寧使扶人手莫開陷人口若能依此言前程永固久又雲笈七籖曰危難中救人一命延年一紀救是善人又當倍之衢州范元之貧士也一日盛暑浴於江岸傍拾遺金一袋歸語其子曰世人以財命為往往殉財以死匿之不忍明日乃携金待於岸果見一婦悲號前來詰其故言夫久繫獄旦夕將死昨鬻産謀出夫罪急遽亡此夫其休矣元之驗實而還之次年父子俱登第此以還遺救人之危者也徽商王志仁三十無子相者謂其十月必有大難王素神其言因急往蘇州斂資歸旅寓中晚步見一婦投水王急取二十金呼漁舟救之問其故婦曰夫傭工度日畜一豕將抵租昨賣之不意皆假金也夫歸箠楚且無聊生耳王倍價周之婦歸告其夫夫不信偕婦至王寓質焉王已闔門寢婦叩門呼曰投水婦來謝王厲聲曰汝少婦我孤客昏夜豈宜相見婦曰吾夫亦在此王乃披衣起才啓門牆忽傾倒卧榻已壓碎矣夫婦驚嘆而去王歸復遇相者駭曰子滿面陰德不獨免難抑且獲福後生三子兩登科第此以已財救人之危者也廬陵周必大監臨府和劑局局內失火火犯當死公問吏曰假若火起自官當得何罪吏曰削籍為民必大遂自誣伏坐失官吏免死後必大復中詞科官至宰相封益國公此以已位救人之危者也吳獻臣與羅玘同在太學玘僕染疫死玘亦染疫獻臣為煮粥負之登厠晝夜十數次玘病痊同登進士此以已身救人之危者也感應種種纍牘難盡又有最奇者高郵張百戶往淮安返舟湖堤望一小舟浮沉波上有人居舟背呼救張憐而急出白金十兩呼漁舟救之至則其子也正德年七月海溢沿海居民皆漂沒少定見一女子手扶一笥浮沉而來將抵岸一人利其笥遂沉此女及發笥見一庚帖乃其所聘妻也夫救人而適救其子殺人而適殺其妻天道之報施亦巧矣哉見人之得如己之得見人之失如己之失世人忌得幸失只緣此心不平抑思人所得豈分諸我而有忌心人所失何益於我而有快心總之自生煩惱徒增罪孽耳建德王本立嘗云某為諸生時於嵗考後適有分守某行縣諸生謁見間言及考事惟問案首姓名幫補進學人數而止餘不問焉越數日分巡某繼至亦言及考事惟問黜退停降人數而止餘不問焉諸生私訝曰二公發問相反如此吾曹志之觀二公去後祿位何如未幾分守公官至戶部侍郎子繼登第分巡公升陝西副使遇安化王作亂腰斬之吁豈一問間遂能致禍福哉言者心之聲而行之表也存心仁厚則一言一行依乎厚焉存心刻薄則一言一行依乎薄焉君子以厚德載物彼殘忍刻薄之人豈享福之器哉然則見人之得如有所失見人之失如有所得者皆殘忍刻薄之人也不彰人短人處塵勞不能無短苟或彰之則彼之名從此敗而素守亦從此隳矣是以韓魏公為相每見文字有攻人隱惡者必手自封記不使人見文待詔徵明不喜聞人過有談及者必巧以他語更之先輩用心之厚今古同轍如此又如羅狀元父循會試寓京失去罽褐同舍生不自安訪得之紿循訪其人比至舉褐示循循急趨出語生曰我失褐初無損彼得惡名尚可為士乎生始謝服又如王狀元華居官時人以他人事誣之或勸之辨白曰此吾同年友事若白之是我詰友也竟不辨後新建官京師聞士論猶為此事紛紛新建欲具疏奏辨公馳書止之曰汝以此事為父恥倘攻發吾友反為吾一大恥遂止噫此二公者一則寧失己物不形人醜一則寧損己名不揚人過豈不更超出尋常萬萬乎不衒己長人有所長定有所短胡可衒露且一念自矜即此已是短處矣是以歐陽修長於文章對客多談政事不及文章蔡襄長於政事對客每談文章不及政事二公皆善居其長者也每見年少英露之士眼前併無一切到底只是平常甚有困頓湮鬱而死者豈非福量淺薄自無受享之地乎昔李泌七嵗能文嘗賦一長歌見志聞者莫不嘆賞張九齡戒之曰君早得美名必有所折宜自韜晦歌詩只可賞咏風景豈得自揚乎泌感悟泣謝從此不復自衒遂為一代名相遏惡揚善惡者易橫勢如燎原則阻遏之使其改行善者易微機如伏火則表揚之以成其美黃仲昭為吏部文選汲汲以人才為慮嘗曰國家需才如農之積粟今士大夫矯激沽名以閉門謝客為高天下人才何由知之故公每客至輒延見詢訪有所得必書於册雖小官亦不敢忽此遏一人即以遏萬人揚一人即以揚萬人之法也劉夢震曰人嘗謂激濁揚淸是非太明亦足召禍此不盡然宜遏則遏宜揚則揚此為順天之命安可一意姑息昔王賀為御史逐捕羣盜多所縱捨自謂子孫必食厚報後果貴盛無比至於王莽乃竟族滅此何以故蓋捕盜而縱盜必有不當縱而縱者不當縱而縱則如放虎驅蛇害人不少人既受害豈得無報夢震此言的是至論推多取少人生窮富天已注定今日取多豈遂為多今日取少豈遂為少究竟能喫虧者未嘗不是討便宜處也昔薛包與諸弟分財異居田廬取荒頓者曰吾少時所理也奴婢取其老者曰與我共事久爾不能用也器物取其朽敗者曰吾素所服食身口所安也後諸弟屢破其産包復賑之張士選幼寄養於叔叔有七子一日叔謂選曰吾與汝析箸産分為二選曰不忍諸兄弟止共一分可分為八彼此固讓卒如選言選年十七預薦入京一術士謂之曰此少年乃有滿面陰德必登高第及揭榜果然然推多取少不獨兄弟世人皆然不獨財産凡事皆宜然也受辱不怨凡人辱我定非無因但思我有可辱何怨於彼我無可辱彼自妄耳我又何怨昔呂文穆公初為相有朝士於簾內指而譏之同列欲詰其姓名公曰若一知姓名便恐不能忘不如不知富文忠公少時有罵之者公若罔聞或告之公曰恐罵他人曰明呼公名公曰恐同姓名者其人聞之大慙二公所謂量大福亦大者也長洲尤翁開典鋪嵗終有人白手來取質物司典者不允遂大聲罵詈翁徐諭之曰我知汝意不過為過新年計耳此小事何以爭為命檢原質得衣帷四五事翁指絮衣曰此禦寒不可少又指道袍曰與汝為拜年用他物非所急自可留也其人默然而去是夜竟死於他家涉訟經年蓋此人因負債多已服毒知尤翁可詐故來此既不獲則移於他家耳翁因語人曰凡非理相干其中必有所恃小不忍則禍立至矣古人云忍字敵災星人若不能忍未有能受辱者故佛法以忍辱為第一受寵若驚寵榮寵也一切名位利祿皆是世間禍福相倚事難預料人於受寵時或有盛滿之念即此便有禍機盧多遜初拜參政其父愀然曰吾家世儒素一旦富貴至此未知所終矣多遜不念父言竟以事敗种放初為上召聲名大振其母言曰吾勸汝勿求名今果為人知不得安處矣放不思母言竟以名敗然則受人之寵遂可恃乎故儒者以愛我為美疢佛氏以恭敬供養為軟賊三教聖人其言如出一口施恩不求報梁武帝問達摩祖師曰朕一生施捨有功德否師曰無功德蓋有心求報即非功德也經云求報故施名不淨施若求報施名為施者商賈之人亦可為施是故萬萬不宜求報也北魏李士謙好施值嵗荒出粟千石貸鄉人明年又荒人無以償公即對衆焚券明年大熟人爭償之不受明年又大荒公復施粥賑濟全活萬餘或曰子陰德大矣公曰陰德猶耳鳴人無知者今子已知何為陰德後謙夀百嵗子孫皆顯官宜興邵靈甫積穀數千石嵗大饑或勸之出糶公曰是圖利也或勸之賑粥公曰是好名也乃盡發所積雇傭除道自縣至湖四十里復浚蠡河橫塘水道八十餘里又通罨畫溪入震澤邑人爭受役皆賴全活而水陸又均得利後靈甫夀九十餘子孫相繼登第如此二公真施恩不求報者究竟我不求報報亦未嘗不得語云恩雖亂施有不期而自會怨不可結恐窄路之遭逢洵確論也與人不追悔惡事追悔之則將來惡事漸止善事追悔之則將來善念不生以物與人而更追悔非惟墮厥初心且塞將來善念也范文正公子純仁嘗往江東收租麥五百斛舟載以歸道遇石曼卿自言三喪未葬當世無可謀者堯夫悉以麥舟付之單騎抵家見父文正公曰江東曾見故人否堯夫曰石曼卿為三喪未葬久滯丹陽文正曰何不以麥舟付之堯夫曰付之矣文公聞而大喜此不惟不悔且以為快聖賢德器過人豈不遠乎明正德間江西舒翁遠館湖廣嵗底歸里路逢一婦哭甚哀問之答曰夫缺官銀十三兩有零賣吾以償吾去則兒失哺必死故悲耳翁為惻然曰吾同舟皆江西孰師各出一兩足完汝事矣返告皆不應翁遂盡捐束修與之未至家百里糧盡衆凑銀買米翁無有人爭非之中有憐而食之者翁亦不敢飽及至家呼妻曰吾飢二日矣速炊飯婦曰無米翁曰借之鄰家妻曰借已多專候汝歸償之翁告之捐金之故妻曰如此則吾有家常飯可同飽也遂往山中採苦菜和根煮爛同食一飽既寢忽聞窗外有神呼曰今宵食苦菜明年産狀元此甘受飢餒而不悔者後生子芬果狀元及第所謂善人自此至神仙可冀為一節言積善受福厯厯不爽如此也此言能行上文所言善事即為善人人皆敬之人心本善見真實善人未有不敬者古昔芳踪難以盡述姑以近代一二言之王恕為吏部尚書罷歸天下縉紳過三原者必屏呵從走謁劉大夏為兵部尚書居家時值朝廷調士兵討流寇所在虜掠至華容見公悉羅拜曰大人鄉里安敢犯陳獻章新會人嶺南有遊國學者北士必問曾遊白沙先生門否因以之為輕重文徵明居吳四方入貢者造之不得見必望其居遙拜而去嗚呼王劉二公功業在世宜人皆敬之白沙衡山不過一書生耳而為人敬慕若此豈非善心感發自然而然者歟天道祐之古云天道無親常與善人蓋善人行善與天心合故天祐之也昔劉器之疏劾章惇貶竄嶺外諺云春循梅新與死為鄰高竇雷化說著便怕凡此八州公厯其七人謂必死公未嘗一日病時有一資郎揣知惇意求殺公為效惇即擢為本路運判其人飛騎將至去公所僅二十里至夜半忽聞運判暴死矣此之謂天道祐之福祿隨之隨之謂不求而自得也善氣所感福氣順應自然之理即如醫官甄百里本一庸人然能用心治人病不厭煩苦一日上不豫或薦之一服果愈於是寵冠宮禁數月之間積金至二萬餘是福祿非不求而自得者乎衆邪遠之邪正不兩立譬日照冰山日固自如冰當自解所謂遠也昔景淸為人正直赴舉過淳化邸有女為妖所纒淸入妖遂不至淸去妖復來女詰之曰避景秀才女以告父父追景語之為書景淸在此四字粘於戶妖遂絶心正可以治邪信然神靈衛之神靈隨處皆有所敬者道德所興者忠厚所契者正直所取者陰德果係善人神靈無不衛也昔管寧自遼東歸渡海遇暴風惟自反以一日科頭三晨晏起為罪已而他船皆沒惟寧州自若時夜晦瞑舟人莫知所泊遠望有火光趨之得島島無居人又無火燭人皆以為神光燭之也嘉靖壬戌年興化被冦止忠孝世德三家保全先是世德之家失去珠環婢恐懼逃匿城隍廟夜聞元女至城隍問曰興化城將破奈何答曰天數也那可救吾來專欲保全三家耳一忠一孝一世德俄喚婢出諭曰環係猪誤吞此其小者汝家有世德速告主人宜遠避婢歸殺猪果得環遂全家避賊後賊入城亦戒勿入忠孝兩家所作必成人事既合天心則天意豈違人願善人凡所作為無有不成者天與之也梅公儀知滑州夜報河決勢甚危險公督兵夫隨處堤塞正窘急間見白鬚老人載一舟稈往來助力天明老人忽不見水勢遂平竟有成功歙縣余永寧祖販木為業一日邑中議建石橋估費四千金余立意獨任而資本適止四千又已市木在山因往彼急賣歸而舉事及至彼木價騰湧獲利數倍橋工既成其本如故所作必成大都如此神仙可冀鍾離曰仙之求人甚於人之求仙純陽亦云天涯到處人求我走遍天涯不見人孰以神仙之道為渺茫不可冀者乎求之聞見最著者如子房之忠吳猛之孝蘭期之友愛兄弟王惟賢之不失婦節劉翊之損己分人趙素臺之濟窮恤死許真君之行符施水嚴君平之以善導人周伯持之收瘞遺骸李五郎之不欺斗斛陳安世之不殺物命李奚子之拯濟飢禽唐若山之性無忿怒景相之酷好放生皆自積功纍行以至登仙若使人人積功纍行豈不人人可望登仙乎欲求天仙者當立一千三百善欲求地仙者當立三百善此一節總結上文深明作善為修真之本也功行滿足超居洞天名曰天仙煉形住世長生不死名曰地仙立積也一千三百亦刻期成功之意孫真人曰養成自性雖絶藥餌可保延年若德行不充雖玉液金丹亦自無益斯言可為修仙一大印證苟或非義而動背理而行自此至殺龜打蛇皆承前文其過大小有數百事而來此二句先統言之以下然後條分縷晰示人警戒夫一念有差謬已千里非義背理豈在大乎以惡為能惡如用刁用勢之類以為能者自負為手段也眼前做得行則揚揚得計究竟自作自受未曾討得些子便宜安見為能陳良謨曰正德巳卯余北上至漷縣正家渡同泊數舟皆吾輩也俄聞舟人與土人毆捽至乃余家僮余薄責家僮諭遣土人去坐中同年某者新喻人忽怒罵曰咄爾何人敢集多人上我官船行劫反誣我舟人毆爾耶縛而撻之其人叩頭哀乞乃叱去在坐者皆嘖嘖稱其才能某亦揚揚自為得意語余曰兄何迂哉今之為官者才能智略耳人心天理四字用不著矣余撫然不答其人後為紹興推官惟憑胸臆肆虐百姓竟以考察謫為陽縣丞疽發背洞胸而死無子今其家且狼籍不忍聞矣吁人心天理詎可置乎哉忍作殘害殘害指殺生害命而言人之所以不作殘害者恃有此不忍之一念也一有忍心則無所不為矣閩將吳某新鑄一劎甚利禱於黎山廟曰某願以此劎手戮千人其夕夢神謂曰人不可發惡願吾祐汝使汝不死於他人手後果以此劎自刎夫閩將止是空願而不免以身受報所以然者惡其忍也至如微軀物命亦當時存不忍心不宜殘害王愈忿鵲噪生斷其舌後竟死於舌瘡張霖忿蛙鳴沃以熱灰後忽死於湯爛周昂惡燕雛呢喃飼以蒺藜後生三子皆啞果報昭昭真可謂如影隨形陰賊良善陰賊謂之陰謀賊害也陰謀為害比之暗箭傷人其心最慘不可施之庸流况可施之良善良善之人在朝廷則為國之楨在鄉黨則為民之望苟陰賊之必為天地所不容矣故莊子曰為不善於顯者人得而誅之為不善於幽者鬼得而誅之近時衙門吏胥砌欵單買窩訪下邪火送匿揭種種陰謀為害不少而徒恃佞佛齊僧銷除罪業豈知庇奸黨惡佛必不為賊人未已終當自賊天道好還理自不爽也暗侮君親君親恩同天地此身皆君親所有所恃以報恩者惟此心也可暗侮乎暗侮君者非是違背乎君凡隱忍規避先私後公此心不可與君知即暗侮君也暗侮親者非是忤逆其親凡虛文粉飾奉養不誠此心不可以對親即暗侮親也萬石君石奮每遇賜食於家必稽首俯伏而食如在上前尹和靖將赴經筵必沐浴端拱以明日所講書置案上朝衣再拜此非不暗侮君者乎顧悌得父書拜跪讀之每句應諾或聞父疾則臨書垂泣語便哽咽郭琮事孀母三十年不茹葷酒朝夕虔禱暗祈母夀母得夀一百四嵗此非不暗侮親者乎推之劉璡夜聞兄呼下牀著衣立然後應且不暗侮其兄矣米芾將書柬於友至頓首字必叩首者三是又不暗侮其友矣大抵暗侮二字無有是處既可暗侮即可顯悖太上不言顯悖而言暗侮亦嚴矣哉慢其先生人生於三事之如一是先生之尊與君親等也不可暗侮君親又可慢先生乎正統間祭酒李時勉忤王振被囚國學前太學生石大用具疏請代謁銀臺銀臺懼之以法石曰死生以義何懼之有疏入䝉詔並釋此直救之危難敢慢之居平耶宋彭汝礪少師倪天隱及官保信即迎天隱於齊閣猶執弟子禮甚恭天隱死母猶未葬明年妻亦死公為葬其三喪嫁其女於同年進士宋渙此直敬之沒後忍慢之生前耶陳成卿曰古人十年以長則兄事之年長以倍則父事之凡長於我者即謂之先生俱不可慢叛其所事僚屬之於官長卒伍之於主帥僕妾之於家主皆所事也叛不必背逆凡緩急不相倚利害不相恤皆是趙延嗣事制誥舍人江陵幾江死止遺三女家甚貧延嗣竭力養之十餘年未嘗識女面及三女長乃至京訪舍人舊交翰林宋白侍郎楊徽之大哭道其所以二人驚謝曰汝之所為吾儕不及也於是合迎三女至京擇名士嫁之延嗣不以存亡易心誠可為義僕矣舉此一條庶幾出於僕之上者知所愧慕焉誑諸無識誑者言語虛詐之謂無識之人正當隨事曉諭豈可欺誑以無為有以非為是使之迷誤楞嚴經云眩惑無識疑誤衆生死後當墮入無間地獄彼世之誑妄者習久成慣豈復畏罪如僧人則挾談空而誑方士則挾丹藥而誑師巫則挾鬼神而誑醫卜則各挾其術而誑不知作妄時已久為鬼神伺察矣昔白岑遇異人授發背方療疾甚驗有驛吏欲傳其方普行救濟與數十金岑以假方授之以之治疾不效後岑為虎所食遺一小囊於道上吏過而得之內乃發背真方也此可為醫士誑人者戒亦可為一切誑人者戒謗諸同學同學之友情同兄弟面當責善心存回護若妄加謗毁是小人也昔郭尚書贄初作賦有名同學李勉忌之飛布謗語後贄竟登第及再知貢舉勉方以明經充選詔下之日勉甚愧悔然則謗之而終不能掩其長謗亦何損于人乎三山蘇大璋治易有名戊午鄉試夢中第十一名偶與同經友言之友欣於郡謂其與考官有約及填榜十一名果習易者郡守携狀遍示考官因抽一備卷更之既折號則自備卷而中式者大璋也由中式而改為備卷者欣狀之人也然則謗人而適以自阻其進謗亦何益於己乎虛誣詐僞漫無根據曰虛妄有污衊曰誣詭計䝉人曰詐矯情欺世曰僞合而言之皆不誠也此輩縱能欺人一時久必敗露丁謂平生無真實語自謂人莫能測乃世共目之為五鬼豈非枉用機心乎藥山曰欲識餓鬼道即今之多虛少實令人不信者是陽世陰府俱惡虛僞如此攻訐宗親宗親謂本族一脉相延自當親厚少有猜嫌即肆攻訐薄德甚矣且宗親不肖辱及祖先我攻訐之即是攻訐我祖也豈非大逆昔范文正公有言吾宗族甚衆於吾雖有親疏然自吾祖視之均是子孫且自祖宗來積德百餘年始發於吾若獨享富貴不恤宗族他日何以見先人於地下今日何顏入家廟乎故其恩例俸賜必均及族中又於姑蘇買良田數百畝為義莊於族之貧乏者每人日給米一升嵗給絹一匹乃至嫁娶喪葬皆有賙給其子純仁克繼父志俸祿盡廣義莊今人既不能推恩睦族如公父子又何至肆其攻訐自傷根木之地乎剛强不仁此為使氣者言也好剛使氣則遇人接物純是殺機烏能仁哉故曰强梁者不得其死又曰堅强者死之徒世之剛强自恃者未必害人早已自害即高明之士亦或不免殊可戒也狠戾自用此為恃才任性者言也凡人行事用人則智自用則愚自用不可况於狠戾每見高才力學之士生平儘有見解究竟身名俱敗貽禍更慘者何故總由一向執拗自以為是不肯服人即有好友誰來相親雖有善言誰來相告以故終身失誤一至於此然則狠戾自用不必為惡惡莫大矣是非不當此言處事者天下事是則是非則非自有公論以非為是以是為非是不當也在一人則關繫一人之臧否在一鄉則關繫一鄉之利害在天下則關繫天下之安危率意妄為何得無罪向背乖宜此言處人者人有正有邪向正背邪謂之得宜向邪背正謂之乖宜在仕途中尤為熟審也昔尹穡少有名譽及為官偶附湯思退力詆張魏公遂除諫議後貶竄嶺南追悔前事謂周益公曰我三十年名譽一時不審遂至破壞掃地亦思所得於彼者幾何而甘為此耶至今悔之不可及矣益公每舉此為士大夫之戒虐下取功功成報國固屬公心為賞圖功亦是恆願但自為亦須為人如虐下而取之或罷人力或剝人財或傷人性命縱令功成豈能享受王安石欲開淮河併修河堤二百里范子淵迎其意自薦往糜費百萬溺死者千百竟無成功後論罪流徒峽州夫子淵意欲取功乃反取罪功其可必取乎嘉靖時御史王珣巡按三吳舊例獲盜至三百人者升四品俸珣部中所獲至數千人按之多非實公盡釋去曰我不敢殺人以取功也任滿公升左都御史後四子皆登進士夫王公不虐下取功竟䝉升擢功亦何待虐下取乎殷棠川曰凡官長居民之上皆當為民捍患恤災今乃有水旱頻仍不為請命反急催科不能拯援反行敲撲其意亦曰吾以全功名也嗟嗟功可取也下不可虐也此誠救時之論哉諂上希㫖諂諂媚也希有先意迎合之意上人意旨不善當諫止之豈可先意迎合漢史弻為平原相時詔下舉鉤黨諸郡皆望風承旨株連無數惟弻獨無一人使者切責曰靑洲六郡其五有黨平原何得獨無弻曰先王分疆畫界風俗不齊他郡自有平原自無胡可相比若承順上旨誣陷良善則平原之民戶可為黨相有死而已所不為也使臣怒奏弻欺隱值黨禁中解弻竟免罪此不諂上希旨者景泰中王翰為御史上疏勸易儲與南城禁錮事甚切及英宗復位翰乃屢言二事之非上悅之許以大用一日上御便殿忽風飄一本宛轉上前閲之則翰勸易儲與禁錮疏也急宣翰來發前疏示之翰稽顙出血請死上遽斥出誅之此諂上希旨者諂上希旨不獨臣之於君如屬官迎合上司紳士迎合官府書吏衙役迎合本官奸僕豪奴迎合家主皆是為人下者阿意曲承為非作惡罪固不待言矣為人上者好諛喜佞使人有隙而投以至毒流無窮𡨚結不休寧能獨免於陰譴乎受恩不感一飯之恩古人必報報即無力心必懷感若不懷感是禽獸不如矣三國時李信純家養一犬甚愛之一日信純飲酒城南醉卧荒草中太守出獵見野草深茂命縱火焚之犬口拽信純衣搖之不醒旁有一溪犬乃入水濕身近信純數步內將草盡為浸濕火遇濕而止犬數入水病甚遂死信純旁信純覺而知之痛哭負歸具棺衾以葬太守聞而義之名其塜曰義犬人而忘恩負德視此不當愧死耶抑恩更有大焉者太極葛仙公著大懴法教人報答慈恩一天地二父母三國王四師長世人憒憒一生君親未報而徒沾沾於私恩小德是又棄本逐末與於負恩之甚者也亦可憫已念怨不休受人之害彼時不能無怨過後便當消釋若念之不忘則𡨚𡨚相報豈有已時昔王沂公暮年子嗣不蕃謂人曰豫行已無愧而獲此報何耶但一事有恨豫初守鄆州為監司所輕後秉政陰遷本官略無寧嵗不意竟死於道路想必為報也噫沂公尚不免以此受報况他人乎輕蔑天民凡此蒼生皆上帝之赤子故曰天民輕蔑小民即是輕蔑上帝其陰受天譴不待言矣陶文僖公大臨嘗謂人曰吾儕一列仕籍即令念念濟人利物一生罪業不能贖萬一况可漫不加意乎憶吾往嵗出差赴越往還數千里或出陸路所用負載役夫不知若干人或由水路所用牽挽夫不知若干人茲念小民皆人子也或當炎蒸淋汗如雨或值嚴冬衝冒霜雪由此而踣頓道路委填溝壑者何可數也此等罪業皆由我作如釋氏果報之說不誣能無惕然乎噫凡臨民者烏可不三復斯言擾亂國政國政者天下之公事也以一己之私意更變之是為擾亂蓋祖宗成法有司久已奉行民亦安以為便有一番更改定有一番擾害近則為病一時遠則遺患數世如宋時熙寧新法其明徵大驗者已是以李文靖公為相惟務安靜不擾同年馬亮責之曰外人以公為無口匏公笑曰沆於政事實無補萬一惟中外所陳利害一切報罷聊以報國耳今國家法制纎若凝脂苟循所陳一一行之則所傷實多彼炫名喜事之人幸一時之進肯念擾亂斯民耶時人以公為得相體賞及非義賞待有功所以示勸非義者不宜及而及之也長惡容奸最干天怒故凡司爵賞之柄者俱當愼之胡嘉諫曰賞當則忠良勸罰當則奸究懲今世黜陟舉劾等事不聞悉心亷訪止憑傳聞揭帖讒口諛舌播弄其間直道難容奸巧易售此賞所以多非義而潔已守正不善夤緣之士每每多屈抑也嗚呼賞既僭則罰必濫其何以治天下哉刑及無辜刑者不得已而用之即果有罪亦當詳審况可濫及無辜乎唐武后僭位慮天下謀已屢興大獄周興來俊臣等附之誣引天下豪傑一切以反論朝野震恐獨徐有功據法力爭前後所活數千百家周興等屢劾有功故出反囚罪當斬以此三坐大辟將刑泰然不憂赦之亦不喜嘗曰豈我獨死諸人永不死耶後周興等相繼族誅有功由殿中侍御厯官至都督子孫皆顯官夫周來諸惡阿意酷刑豈不自謂得計乃不轉眼間竟至身夷族滅而犯顏極諍之孤臣獨全身昌後於殺人如麻之世天道好生而惡殺豈不昭昭可信哉然枉法用刑又非必有意好殺或者審之不明因循定罪或者形跡可疑憑律誤斷如此之類雖非故殺而𡨚債有主即與故殺無殊矣趙時為無為軍教授夢一囚告曰某不幸為祖翔枉殺魂訴於天祖不久矣時曰祖公明習法律安有枉者囚曰不然某死雖非祖意實因其一疑遂致移獄𡨚有所自非祖而何月餘祖果卒則用刑之際可不愼乎吕叔祖嘗作刑戒八章甚善今附於此一曰五不打老不打幼不打病不打衣食不繼不打人打我不打一曰五莫輕打宗室莫輕打官莫輕打生員莫輕打上司差人莫輕打婦人莫輕打三曰五勿就打人急勿就打人忿勿就打人醉勿就打人隨行遠路勿就打人跑來喘息勿就打四曰五且緩打我怒且緩打我醉且緩打我病且緩打我見不真且緩打我不能處分且緩打五曰三莫又打已拶莫又打已來莫又打要枷莫又打六曰三憐不打盛寒炎暑憐不打佳節令晨憐不打人方傷心憐不打七曰三應打不打尊長該打為與卑幼訟不打百姓該打為與衙門人訟不打工役鋪行該打為修私衙及買辦自用物不打八曰三禁打禁重杖打禁從下打禁佐二非刑打南皋鄒公曾將此戒刻石於刑部人言刑官無後誠守此戒我知其後必昌也殺人取財財有分定不可强求人若强求必將得禍况殺人以求之乎洞庭山蔣舉人剋剝營利致富十萬雖至親不拔一毛一日盜劫其家鞭撻炮烙備施罄其所有席捲去盜喜過望殺牲載酒賽願於小雷山神山在湖中斷崖絶無人居盜登祭畢酣飮大醉不虞廟祝共舟人截纜而去盜歸無計嚴冬凍餒共斃廟中此殺人取財之報也然世之殺人取財者不必盡是劫盜如貪吏取財斃人刑獄之中豪家取財迫人死喪之際庸醫取財乘人危急之時其為殺人一也揆之往蹟皆墮惡報傾人取位元始上帝曰一官一職各有義命義命當有不足為難義命若無只做一日也不可得豈可傾陷訛人而自取之彌德超見樞密曹彬勳望隆重因誣以不軌於是彬罷德超拜樞密不數日趙普力為辦雪復名彬德超遠竄盧多遜見宰相趙普位望特重因設計傾之於是普罷多遜拜相既而事狀明白趙普復相多遜遠竄朱崖觀此二子凡傾人者當自傾也實非傾人誅降戮服禦敵斬級名曰應兵不得已也若既降服而又殺之禍莫大矣漢李廣屢著邊功不得封侯語王朔曰豈吾相不當封侯耶朔曰將軍自念嘗有所恨否廣曰吾為隴西守時羌嘗反吾誘降者八百餘人殺之至今獨恨此耳朔曰禍莫大於殺已降此將軍所以不侯也後廣出征失道自刎殷士儋曰殺降既不可乃今之為將者視殺降尤甚寇至殺人盈野寇退即斷被殺者之首隱冒上功又或撲掩行旅洗劫村坊充其級數此等慘毒受報不待言矣司核驗者不肯盡發其狀其罪亦與同科貶正排賢正人賢士中外所倚乃或貶逐之或排擠之則妨賢病國為惡已大受報必慘陳後主時幸臣司馬申好排陷人一日晝卧尚書省忽有惡鳥集身啄其口吻血流被席死周世宗時陶穀亦好陷害人死後葬昭覺寺忽雷雨大作劈開墓門震攝其尸不知所在貶正排賢之報不當如是耶凌孤逼寡孤兒寡婦人間之最不幸者有等惡人幸其無依乘機騙害或侵占田産或驅奪財物或詭派差役使孤寡流離無所控訴神鬼伺察必有代為伸𡨚者矣吉水灘周傑占其孤姪地基造樓二間姪不敢爭惟焚香訴天宏治二年五月十八日忽大風雷移其樓於他處空還舊地不差尺寸傑跪基上不能言者七日始曰吾已知欺孤之罪矣不二年竟惡疾死此凌孤者方城鞏固以機械治生其鄰周氏家富一旦男子相繼疫死止餘一老媪并十嵗孫固置酒延媪謂曰汝年已老挾此美産殊非善計盍以産售我我為爾息俟汝孫長産仍歸汝媪喜從計固因盡室徙居之未一年寇犯唐州鞏氏家口盡殺其處無一得免寇退周媪復歸舊業此逼寡者棄法受賄居官棄法必因受賂賄賂一入則曲直輕重皆不問矣豈知一法一律鬼神所主棄法受賂功名壽算便當減奪乎荆州府推官魏釗以公事往夷陵道經某鎮鎮有鄉紳徐少卿夢神告曰明晚魏推官過鎮此人前程遠大後當為吏部宜預結之次日果至因欵留焉數日少卿復夢曰可怪魏推官此去受賂四百金故出人罪使死者含𡨚上帝已削其官爵夀亦不永矣少卿訪之果然未幾魏丁憂歸逾年卒家業凋零夫居官棄法受賄得報固應如此為鄉紳者每每受人贓私伐為囑託致使官府枉法狥情司報應者豈遂無法處此輩耶台州舉人左蹕赴禮部試卷甚佳房考擬為第一忽夢神告曰比台州左蹕文也頃居鄉受賄若干為人請託致有枉法而死者今已滅折祿算幸無取也遂黜之及榜發查對原卷果左蹕也未幾蹕客死燕山朱璣曰棄法受賄豈惟官長凡書吏衙役亦多有之蓋官長耳目有限事事操之公門中人其間狐假虎威舞文亂法奸弊豈止一端造惡造業未有不遭天譴者不然此等怨毒之財能安享乎以直為曲以曲為直韓魏公曰兩訟在官曲直未定生死豫奪繫吾一言其可輕忽今不免曲直顚倒非因受賄即是狥情否則率意鹵莽耳有一於此豈宜居民上乎錢若水為同州推官有富民失女奴父母訴於州委之録參録參舊與富民隙遂申劾富民父子共殺富民已誣服獨若水遲疑録參語侵之若水笑曰父子皆坐重辟豈不容某熟察又越旬不決知州亦有言若水終不奪一日潛詣知州告曰某以家財訪女奴今得之矣知州遂釋富民父子富民詣若水謝若水閉門不納富民繞垣而哭知州欲以此奏之朝廷若水辭曰某初心止圖拔𡨚非圖爵賞且朝廷聞之如録參何知州嘆服太宗聞其事擢知制誥進樞密使後無病而卒陳舊為開封府曹時章獻太后臨朝太后族人杖殺一卒公當驗尸太后遣中使十數輩諭㫖吏惶懼欲以病死聞舊獨正色曰彼實𡨚死待我而伸奈何懼罪驗不以實乎汝等勿憂吾當任咎奏入雖大忤㫖舊亦不及罪自是著名不數年厯臺省官至三司以上二事一是不以直為曲一是不以曲為直由此大者推及小者凡事皆當平斷蓋百姓多愚或被一事之枉銜怨終身甚有慚憤抑鬱而死者是故讞決之際不可以不察也入輕為重書曰罪疑惟輕又曰寧失出毋失入若犯罪本輕而反重入之所謂哀矜之意安在乎楊旬為夔州推司處心正直積纍陰功有子名椿年二十四中天下都魁夔州使君聞之請旬來令旬解職旬曰念旬為吏四十年家無餘資惟積陰德留下三箇慳囊乞台㫖取來開看第一箇有三十九文當三錢第二箇有四千餘文折二錢第三箇有萬箇小錢使君問故旬曰每決獄囚但遇入輕為重者或從死罪改為流罪即投一當三錢或從流罪改為杖罪即投一折二錢或從杖罪改放便投一小錢今日旬男奪天下都魁皆平日行善所致也敢舍公門而自放逸哉噫公門好修行此語誰不知之而積德行善者有幾如旬所存真可為此輩勸也陳軒未第時夢至一官府門懸金榜題曰左丞陳軒右丞黃履後履官至右丞而軒止龍圖學士晚年語諸子曰吾平生不作欺心事今位不副夢當思昔守杭州有達官執一老兵送府欲杖之此兵罪不應杖遂令贖達官折柬相責乃呼入行杖不意竟死杖下至今二十年恆以自尤違法狥情宜不登顯位汝等戒之夫初念不忍既以達官見責而移是不忍之心不勝其畏達官之心也達官何足畏不過為自己欲登顯位計耳孰知反以此削其顯位彼承順上司入輕為重者不當鑒此乎萬厯初王萬祚為巡江御史極淸亷而性頗嚴刻捶楚之下有以小過而被重杖者有以輕罪而致殞命者未幾得病衙中嘗有𡨚鬼前後呼呌僚佐往候之無不聞者數日而死夫淸以持身必不當刻以絶人然持已淸者往往多刻入輕為重事所必有已每見吾鄉士大夫居官甚淸介有聲及身死而其子孫蹇落不振母亦犯有此病歟故居官任性者亦當鑒此見殺加怒人之有罪固其自取然死者不能復生目擊心傷憐憫不暇加怒何為昔子羔為衛士師刖人足後值衛亂子羔出走刖者守門屢引之逃匿羔謂刖者曰吾向者親刖汝足今吾在難正子報怨之時而反如此何也刖者曰刖足固我之罪向者見君論刑時有愀然不樂之色此吾所以感君也然則見殺加怒死者其能無憾乎知過不改過與惡不同惡有心過無心凡一念之差一事之誤皆謂之過然初時不覺無心之失也既而覺之不能即改則是無心變為有心矣故袁了凡曰人未行善先須改過佛家教人懺悔亦是勸人改過也嘉靖中葛守禮為陝西布政當大計日有小吏填老疾當罷公請留之吏部曰計簿出自藩伯何自忘也公曰此邊吏去省遠徒取文書登簿今見其人方知誤填過在布政司何可使小吏受枉尚書驚服曰誰肯於吏部堂上自陳過誤即此可謂賢能第一矣後官至刑部尚書江陰張畏巖甲午鄉試不中大罵試官旁有道者笑曰還是相公文不佳張叱曰野道烏知之道者曰文貴心和氣平相公心氣如此文安得佳張不覺屈服自此折節自持丁酉夢見試録一册中多缺行問之旁人答曰科第三年一考拔中所缺皆原該中式或新有薄行而去之者指後一行云汝三年來改過自修當補此是科果中一百五名知善不為長春真人曰人在世間方便第一力到便行蹉過可惜今之不為善者亦未嘗盡是不為或者有好名心持於大而忽於小又或者有求報心勉於始而怠於終豈知存此心者皆為太上之罪人乎南豐劉徹屢舉不第祈夢於神夢神語曰汝生平見善不為且有虧德何望登第徹訴平生並無虧德神曰汝弟負官錢不能助令死杖下非虧德乎徹又以弟不肖為解神曰行道之人見且不忍何况兄弟汝不知朱軾代納靑苖事耶行獲為善之報矣徹覺訪於軾軾曰今年某遠館歸見途中械繫者云缺靑苖錢二千五百限滿無償某因以束修與之不意已䝉神契後軾生三子皆顯官噫世人終身不為一善而自謂善人又或齊僧造寺不惜千金而同氣顚連不一引手者比比是也盍以劉徹事類觀之自罪引他引扳引也與推過嫁禍者不同不善之人自作罪惡及至事發則扳引他人不知孽惟自作終當自受若妄相扳引是業中造業矣縱逃王法豈逃天誅昔夏原吉為戶部尚書吏污精微文書驚懼待罪公曰汝勿憂明日公入朝請罪曰臣不謹筆污精微文書上曰易之吏得無罪夫他人之罪尚欲引歸已身彼自罪引他是何等心術乎壅塞方術方術如農圃醫卜之類凡人挾一技一能淺者藉以養生高者用以濟世苟一語阻之使不得行一事遏之使不得售即是壅塞翟乾佑在世時念雲安一邑江險有一十五處一日作法召灘神俾平之一神峩冠大袖慨然進詞曰觀師之意不過欲便舟楫不知從事舟楫者日常倍利縱有小費不足為損沿江小民三四百家無田可耕無桑可蠶全賴挽負資生今若盡平灘險小民衣食如何師嘆曰汝所見非吾所及也遂止以此推悟壅塞方術豈得無罪然亦視方術何如耳昔朱文公患足疾有道人為針治旋覺輕便公喜贈以詩後道人去數日足疾大作追尋莫知所往公嘆曰非欲罪彼但索前詩恐持此誤人耳世間庸醫不少可懲壅塞之弊遂妄為薦揚乎至於巫蠱之術與夫燒煉採戰諸方皆能令人亡身喪家此輩尤當禁制訕謗聖賢三教聖賢皆當並尊何敢訕謗其訕謗者約有兩種一是愚癡無識一是才辨自雄愚癡之人罪坐不知而才辨之士往往執所見以謗所不見其罪乃更甚於愚癡不知儒與釋老教雖分門理實一致今儒者徒見僧道一種惡習遂妄議二氏短長盍思眼前儒者品行大謬無惡不為亦可以此訉訕孔子乎故知偏見橫議甚為不可然訕謗二氏之罪報應從來不爽人或信而畏之惟儒家不談禍福遂反有肆意訉彈者究竟何嘗無報耶宋淳佑中南昌先師廟傾圯知縣李作新廟於縣南往移聖像十餘人舉之不動一士人在旁戲曰是之謂重泥其人夜夢朱衣人追至廡下決杖三十及覺如癡人自是更不識一字夫一語之戲受罰尚爾况訕謗乎朱璣曰書籍字紙乃聖賢之遺亦不可忽梓潼帝君勸惜字有云楊百行坐經文而舉家害癩鮮子坤殘孟子而全家滅亡楊全善埋字紙而五世登科李子材葬字紙而一身顯宦果報昭然均可為鑒故作踐字紙亦當與訕謗聖賢同罪侵凌道德三教在世均有主持之人為之接引故道高德厚者尊為世間導師經云道高龍虎伏德重鬼神欽彼何等人乃敢侵欺而凌辱之在有道德者固犯亦不較不知司過之神怒其悖逆思欲垂戒他人罪必不免成化開操江都御史某酷惡遊方僧道驅逐甚嚴忽有一比丘不知何來坐大中橋說法衆如雲集御史聞之怒甚親往鞫之至則比丘端坐不動怒愈甚命左右擒之不能動遂命掌其頰頰中白光一道昭耀如朗月御史方驚駭而兩股軟罷不能立矣急回語妻曰此天人道德尊者吾誤以左道疑之今死矣言訖遂絶射飛逐走射飛不止用弓箭如用藥鎗鳥銃粘竿扣索之類皆是鎮江錢參將部下卒獲一鴈籠之舟尾空中有一鴈隨舟悲號將登岸籠中鴈伸頸向外大呼空中鴈忽下二鴈以頸相交而死錢參將聞之大怒同舟兵卒各杖三十河南潘柳好獵入山見一老猴發弩射之初發為猴所接再發中臂度不能支遂抱其子乳之復摘木葉數片盛餘乳在傍大號而死潘見之破弩折弓終身不獵由此二事觀之一切禽獸皆有人性皆有眷屬或飛或走射而逐之如人離家出遊路被殺害妻子盼望其慘何如詩云勸君莫打三春鳥子在巢中望母歸此言不獨為射飛者勸兼可為逐走者勸發蟄驚棲蟄者藏也蟲之伏蟄猶人之隱處倘被發掘必至傷殘故高子羔啓蟄不殺孔子稱其賢曹彬孟春不修牆屋曰恐傷蟄蟲仁人愛物固當如是至鳥之棲宿亦猶人之寢息有意驚之亦是忍作殘害之一端如王遵忿鵲喧噪俟夜深棲定以竹竿戳爆竹驚之後遵得疾驚悸而死則驚悸豈微過乎填穴覆巢穴者衆生聚處之所自人視之一穴耳自彼視之則皆以為安樂房舍若填塞絶其出路豈不覆族盡死芝里朱某平生惡蜂窠每見蜂從竅入雖高處必設梯塞之在人家亦然後生二子穀道皆塞人教以稱尾燒紅鑽之竟死鳥之有巢抱卵哺雛所以寄生育也覆之是絶其生育矣不仁孰甚蘇州薛氏小兒屢升木杪覆巢取雛一日上樹不期先有大蛇啖雛巢中兒驚視張口蛇竟入口兒遂死不仁之報於此可見傷胎破卵物之胎卵猶人孕育若剖破之使不得育即是戕絶天地生機慈心於物者斷不然也宋真宗祀汾陰見一羊自擲道旁怪而問之對曰今日尚膳殺其羔真宗慘然不樂自是不許殺羊羔學士周豫嘗煮鱣見有彎身向上者剖之腹中皆有子乃知曲身避湯者以護子故觀此則胎尚可傷卵尚可破乎佛經云魚子不經鹽漬三年尚可再活宣和間富啇楊序大書此語於通衢人由是知戒見人殺魚即投子於江中夜夢神告曰子本踰期當死今活億萬命夀可延矣無力放生者當知此願人有失武安王云願天常生好人願人常行好事邵康節曰每日淸晨一炷香謝天謝地謝三光所求處處田禾熟但願人人夀命長國有賢臣安社稷家無逆子惱爹娘四方平靜干戈息我縱貧來也不妨古人發願如此彼獨願人有失何耶我知人未失已必先失矣李士衡與余英奉使高麗所得貨物甚多英恐過海船漏盡以士衡之物籍船底以己物置其上及開船遇大風船幾沉舟人急請減載倉皇信手拋去及風定檢驗則所棄皆英物士衡物在船底竟無一失毁人成功毁有二義一毁敗一毁譖人之立功無論大小莫不竭力圖成及其方成乃欲毁之此等心術蛇蝎不如矣昔王欽若毁寇準之功命促無子秦檜毁嶽飛之功子孫滅絶究竟萊公與武穆雖受毁不磨而欽若與檜千載遺臭人亦何為迷而不悟耶危人自安危人自安者如與人同處令人當其險我居其安與人同事令彼失便我得無恙也李緒知永安軍時大盜方起恐及禍乃薦范鉶代已於是鉶知永安緒得離任後盜破永安鉶舉家被害未幾李緒改任杭州路遇劫賊亦舉家被害一還一報豈不捷如影響乎減人自益減損乎人自取饒益所謂只願己富不顧他貧是也究竟明來暗去誰益誰損陳祈有幼弟三人慮其長而均分田産乃先取田私典於厚友毛烈逮弟長止以現在産均分後以錢贖所質田烈知其故受錢畢竟不與劵祈憤甚訴之東嶽祠祈與烈皆死既而祈還述其對審時烈惟持劵為證王指其心曰劵何足憑止憑此心耳烈乃伏罪付重獄祈以兄剋弟亦減祿算釋回夫祈欲減弟自益而被烈劫烈欲減祈自益而受神誅暗中銷算忽不爽可懼哉常州蘇掖仕至監司富而多吝嘗買一別墅反覆欲減價售者情急無可奈何其子在旁曰大人可少增金兒輩他日賣之亦得善價父愕然自此少悟噫此子所言可以醒世之減人自益者以惡易好物有美惡人情愛憎因之若以低醜之物換人好物是即穿窬之行也宋蘇軾珍藏一美玉章持求觀因以燕石換去軾初不覺既而覺之但發一笑及持流死台州不知美玉又歸何人矣大抵世間好物原自流通得之巧失之必巧私之何益以私廢公徇一己之便誤天下之事徇一己之愛憎枉天下之是非皆為以私廢公趙抃為御史時與范鎮論事有隙及王安石為相鎮屢訐其短於上安石恨之一日上問鎮於安石對曰問趙抃便知鎮之為人上果問抃抃曰忠臣也上曰何以知之曰昔仁宗違豫鎮請立皇嗣疏十九上候命百日鬚髮皆白非忠臣而何上然之既退安石曰公不與鎮有隙乎曰抃何敢以私隙而廢公道安石大慚王翱為吏部尚書時次孫疄已蔭監生將秋試以有司印卷白公公曰朝廷取士至公無私汝若以僥幸中選則妨一寒士進步且汝已有階得仕又何必爾裂卷焚之此皆不以私廢公者以私廢公何得無罪竊人之能竊者非其有而取之之謂人有才能我明用之仍當歸美於人可遂竊為己有乎高齡初年學道晚遭病魔祈佑於真君真君判曰齡敗德已久鬼訟日多又嘗竊古銘記以為己文水官譴其竊能沽譽特列為巧詐之首其不免矣未幾死夫竊能不但竊人文字如竊人之謀以為己所畫竊人之功以為己所成竊師傳之教誨以為己之識見是皆欺心之事獲譴必矣蔽人之善凡人稍有所長皆謂之善蓋之使不得彰即蔽之也許真君在世嘗修一觀欲記其事偶得一片古碑文已磨滅因剗去舊跡勒其新記一日恍聞空中有聲曰所剗舊碑文雖磨滅而當時文人訴君奪名自顯盍早圖之許於是尋訪舊文另為立石是夜夢一人謝曰䝉君再顯吾名君亦由此證道矣夫人一文字耳死後尚欲彰之况善有甚於文字者乎萬厯間江陰縣修縣志一廩生有才與其事偶見二節婦有其名而無實蹟可考遂削之城隍廟道士夜夢二婦人泣訴云某等一生苦節死載縣志某生不訪氏行表章之反并氏名氏削去神曰此生合登黃甲既輕節義當削其祿籍令蹭蹬諸生二婦泣拜而去生聞之斤為妄語明年果考劣奪廩遂憤鬱而死形人之醜人有醜事或偶誤或不幸當為之委曲掩護今巧為形容豈是厚道聶從儀好作詩嘲笑人後坐謗政竄死登州章齊一戲成一詩人醜畢露晚得惡疾嚼舌而死惡報多端不能盡述其最傷陰德者尤是談閨閫致人終身受污無可辨雪此等受報又豈止嚼舌而死乎訐人之私訐攻發也私者陰暗之事人之陰私最怕人知乘機攻發使無所容則心地陰險實為鬼神所忌姚舜牧曰經目之事猶恐未真聞人曖昧切不可出諸口一句虛言拆盡平生之福此語誠可深省也昔劉邠劉恕同在館中邠一日問恕曰聞君昨日冒雨往州西何耶恕曰丁君閒冷故訪之耳邠戲謂曰丁方判刑部得非有所干請耶恕遂懷忿至不能解異日邠方知果有干求彼時誤中其諱耳可見一語之誤便已結怨如此况有意攻訐者乎耗人貨財耗消耗也破人之家取其財寶是一網打盡耗人貨財是逐漸侵漁也世間奸惡小人蠱惑愚癡於中取利愚癡墮其術中久而不覺始雖逐漸消磨終必一敗塗地為害可勝言乎列其事狀如引人嫖賭哄人燒煉唆人鬬訟代人通關節之類徐池嘉靖時人富而狡嘗欲圖徐入房因令人誘其子徐臣嫖賭纍債數多遂賣此房池買得之後二子五孫俱染瘵疾設醮禱於城隍廟有乞兒迎問曰公非徐池乎昨夜我宿廟中有人向神呼汝名告汝耗其資財吞謀産業神亦大怒池驚返遂卒二子五孫相繼而死文奇蜀人挾燒煉之術諸貴悉為所欺富啇李十五積貨纍萬惑奇之術三年掃地遂至自經奇復在劍州僦一屋煉藥火發延燒奇倉皇走避迷入林中為鷙獸逐出深入溪谷復為鷙獸逐出竟死於燒藥之所舉此二條餘可推已冒起宗曰子每見權貴之門及暴富之室不肖子孫淫蕩恣靡或身未死而産已暗鬻他家或肉未寒而人已裂據其室前人一銖一寸而積之後人如泥如沙而棄之而彼不肖者又大半皆聰明人也此何以故蓋因當日逞威挾智逼勒牢籠以成巨富始而耗人後為人耗語云來得不明去得正好蓋此謂也此言又可為貪積貨財者下一針砭離人骨肉真西山曰有親族不和父子兄弟夫婦參商者當曲為調停使之和好實修真要路也陝西袁公值闖賊亂父子失散流寓江南欲取妾生子適有人賣一婦與銀三十兩婦至背燈而哭公詰之婦曰家中貧餓難忍夫欲自盡妾故賣身以活之念平日夫妻情篤一旦改事他人故不禁傷痛耳公惻然不忍犯次日送還其夫除身價不取仍贈白金令之治生夫婦泣拜而受一日其夫至揚州遇數人牽一童賣貌甚淸夫私計曰吾欲覔一閨女報袁公一時未得盍先以此進之因問身價幾何曰每嵗一兩童十二嵗遂出十二金沽之渡江送至袁公家袁公熟視之則其子也父子相抱大慟已而大笑此全人骨肉之報也孫侍郎洪少遊太學一同舍生得家書云昨夢至一宫府見登科録汝與孫洪皆有名但洪名下有硃批云某年月日不合寫離書當除名孫見之愕然曰事果有之向過某州適見翁媪相詬求離乞子代寫離書輕應之實無他意不謂受譴乃爾及就試生果中而孫下第後訪其人夫婦俱未偶因述前事置酒合之孫果登第屢典大郡所至有離婚未嘗不婉轉調護夫洪以無心之失且有鬼神所譴彼有意挾私挑唆離間者又當何如乎侵人所愛一器一物彼既愛之孰肯與我欲侵人者當思我之所愛人若侵奪我將何如則貪念息矣孫泰山陽人有姨將死以二女託曰姊損一目汝取其妹姨死泰嫁其妹取其姊嘗買一鐵鐙臺歸而磨洗之乃銀也送還之又嘗用錢二百緡置別墅將遷入聞老嫗哭聲問之曰舊居相戀已久一旦為他人得故悲耳泰即取劵焚之不索其直古人不肯奪人之好如此彼奪人之好者能安然常享耶張該有宅宏麗以乏用典張俊千緡俊心愛之乃厚賂牙人換作賣契後該益窘詣俊找價出契示之該不能辨仰天灑淚而已末幾俊子孫皆失音而死夫侵人所愛而以至愛之子孫償之何其愚耶助人為非為一惡事受一惡報理之常也若助人為非則己無惡跡人負惡名較自己為惡不更加一等乎丹陽縣令楊開性暴橫果於決責惟與楊詢最厚詢明知其非不敢忤意但一切讚嘆而已一夕詢夢神責之曰成楊開之惡者汝也開罪當坐汝亦難免未踰月果中惡疾死蓋一語讚嘆即其助也不待出力逞志作威凡人立身正直自能服人若動逞意氣故作威凌此怨府也人誰肯服又何况造物忌盈陰譴將至乎南京史良佐為西城御史而家住東城每出入怒里人不為起乃執數輩送東城御史究治東城御史詰之對曰民等總被倪尚書誤了曰何誤曰尚書亦南京人其掌兵部時出入里中衆或走避輒使人止之曰與爾曹同鄉里我不能過里門下車乃煩爾曹起耶民等愚意史公猶倪公遂不為起不意逢彼怒也東城御史笑而釋之噫聞此言者應當愧死無俟陰譴之至矣辱人求勝恥心人皆有之誰肯甘心受辱者乃於此中求勝天道好還辱人還自辱矣昔林退齊尚書臨終子孫跪請曰大人何以訓兒輩公曰無他言只要喫虧噫從古英雄只為不能喫虧害多少事林公此言凡勢要人誠宜大書屏右常目在之敗人苗稼苗稼在土皆有穡神司之合家勤苦春耕夏耘始得有此苗稼官司仰賴性命攸關可敗之乎敗之者或阻其水利以旱之或潰其隄防以淹之或縱其牲畜以踐食之不仁甚矣泰州富安場孫某每日五更縱牛食人靑苗萬厯辛亥年為雷震死人皆以為害農之報夫牲畜踐食所敗猶少惟官吏豪民壅泉放水所敗尤多其受報必將不止於此矣破人婚姻破人未合前破人已合後皆破也梓潼帝君救劫章曰瀘州李挺先才高自以為第一以好破人婚姻遂降其籍諺云一世破婚三世窮蓋有意破婚最是慘毒之行宜受此報也又有自毁婚姻者何元益為其子與趙明夫議親已定而趙女失明家計寥落元益毁其盟與單子文為親次年父子俱喪趙女適士人葉惟先惟先登第三典大郡此事亦載之梓潼救劫章或問至親密友託我詢訪亦可專意和合誤人終身否曰若容貌之媸宜為掩飾惟其人不肖及其家世不當聯姻者勸之斟酌可也苟富而驕非義而致富謂之苟富如剝人肥己僥幸獲財皆是也大抵冒越之利鬼神所忌因福致禍往往有之况可以之驕人耶梅溪有富翁最貪鄙錢穀日積陳棟塘曰此人當有奇禍既財積不散又無一善狀欲無殃得乎且往惟貪吝可鄙近漸驕橫是速禍也未幾為賊所殺又棟塘見聞紀訓曰正德三年州大旱各鄉失收獨吾村賴堰水獲熟官以災槩免租明年大水各鄉淹沒吾村獨高阜得收官又以災槩免且得買別鄉器皿價廉獲利三倍於是各家狼戾屑越無日不揚揚樂也余曰吾村當有奇禍吾家與某某根基稍厚或止於損耗彼俞費芮李四姓恐不免未幾村大疫四家男婦盡死越一年吾三家果陸續罹回禒然則苟富而驕能免禍乎苟免無恥免者或免刑罰或免死亡也涅槃經曰無慚愧者名為畜生人當患難之時搖尾乞憐哀求苟免既已苟免便當悔悟乃反揚揚得意略無恥心是尚得為人乎昔范純仁嘗與司馬光論役法不合後朝廷治司馬黨韓維以執政曰與光不合得免或勸純仁借維為例純仁曰吾昔與君實同朝論事不合則可以為今日解脫地則不可有愧心而生孰若無愧心而死乎不苟如此公真可法認恩推過恩非己出而冒認之過本在己而推之於人此悖戾小人所為用心平等者斷不爾也王曾為相士夫有請差者公察其可用必先正色拒之既而擢用併不與言嘗曰用賢人主之事若使之知即是我狥私而市恩也恩欲歸已怨使誰當此不認恩者曹彬與王全斌伐蜀斌殺降卒三千餘人公諫不聽及歸上怒必欲鞫勘公自誣伏全斌獲免此不推過者嫁禍賣惡前云自罪引他又云認恩推過引與推其惡顯然太上猶且深惡之况設計陰險嫁禍賣惡乎嫁禍者如嫁女於人人亦樂娶賣惡者如賣物於人人亦願買此等機械甚深受報必加慘矣姚孜與王虎奉命同盤大雲倉孜受監吏賄虛檯缺折正數虎不知也及事將敗孜將原受金銀托漆其外以寄虎虎不疑留之後上司鞫勘孜誣虎同受贓搜驗得金銀托虎乃知為孜所賣氣結而死孜復用計盡將己罪坐之得自脫自是常遇虎時時發狂若與人毆擊口鼻流血既絶復蘇如是三年知州錢延年為請道録宋之才禳救孜忽從卧榻趨出跪真武案前自陳始末延年從旁録其語俟醒示之慙憤而死沽買虛譽譽者名也沽買有用賄邀致行術招引之意陳希夷曰名者古今之美器造物之所深忌每見古來忠臣孝子淸流正士身被榮名必遭困抑或子孫多不昌所以然者名亦福也造物不肯以全福𢌿人豐茲嗇彼必然之數況無實沽譽者其折挫更何如乎梓潼帝君有云假行竊名最攖神怒夫博名於人而干怒於神豈為善計乃今世之人迷而不悟寧為神嫉不為俗非如居官本不亷要人稱亷本不公要人稱公買囑薦揚刋刻碑頌種種欺世之事方且自謂得計寧畏鬼瞰其旁耶又如假名士假文章假道學假節義互相標榜廣通聲氣一日敗露聲名俱喪往往名士得禍其慘更甚於平流則務虛名者又不但折福已也不可不戒包貯險心貯藏也包藏於心人不能窺也世間一切壞事皆由心造險心常在即不加之於人已是滿腔惡業矣况既存諸心未有不見之行事者乎故佛經謂修橋補路不如先平心地心地既平一切皆平挫人所長前云蔽人之善又云挫人所長挫較蔽更甚蔽是隱而勿彰挫則故示摧折也夫人有所長正當委曲造就以盡其才反行挫折使之志銷意喪乎穆修以詩著名真宗見其詩大加賞嘆曰有文如此公卿何不薦來丁謂一言沮曰此人行不逮文上由是不復問謂挫人所長如此所以死無葬地也護己所短此與知過不改有別蓋知而不改特不改耳未必故為掩飾也護則有多方掩飾之意如人有病亟須醫治諱疾忌醫必為一生之害矣冒起宗曰凡人護短初念或畏人譏彈或徐圖改易眼前雖彌縫得好心上還打點不過殆遷延不改則認非為是久假不歸始猶欺人終且自欺是以病入膏盲竟不可救短其可自護乎護短不獨自己一身凡子弟家人及吏胥門客所作過惡皆因我而起不能防檢反養成之亦是護已所短乘威迫脅迫是逼迫脅是挾制乘威迫脅較之逞志作威又加一等蓋動逞威凌取快一時與乘借威權恣行逼勒為惡雖同輕重自別如為官者因不服而逼之使服財不與而逼之使與以至興一工役刻期取完催徵錢糧急於星火皆威脅也又如富貴之家借勢橫行女不從淫而逼之使從産不願售而逼之使售以至逼索債負倚强取盈收斂租稅錙珠務盡亦威脅也人怨天怒其不受報者鮮矣梅侍郎衡湘公初為固安縣令邑中多宦為梗一日有中宦饋公豚蹄乞為追負公烹蹄召中宦飮併召負債者至前訶之負者訴以貧公叱曰貴人債敢以貧辭乎今日必償少遲死杖下矣負者泣而去中貴意似惻然公復呼來蹙額曰吾固知汝貧然無可如何也亟賣爾妻與子持錢來雖然吾為汝父母何忍使汝骨肉驟離姑寬一日歸與妻子訣別此生不得相見矣負者聞言愈泣中貴亦泣辭不願償為之毁劵嗟嗟世之乘威迫脅者特未念其鬻妻賣子一段光景耳誠念及此尚忍乘威迫脅乎縱暴殺傷凡為將相而橫暴殺人為人好殺衆生皆是也天道好生人命至重彼無心致人於死者𡨚報尚自不爽況乃縱一日之暴乎宋王韶經略熙河殺人甚多晚年皈依禪門嘗悔前事一日問祖心禪師曰昔未聞道罪業良多今聞道矣罪業滅乎曰今有貧人負債及富貴而債主至其償乎韶曰必償師曰然則聞道矣奈債主不放何歸即言動發狂尋背疽終日合眼醫命開視韶曰有無數斬頭截腳人在前安敢開遂死語云憑君莫話封侯事一將功成萬骨枯為將者念之哉至物之於人軀殼雖異命無兩般但試自觀我今有病肯遂死乎不免求醫問卜以冀速安大限若至亦肯死乎又不免祈天禱地以求增算我既畏死彼寧不畏我既貪生彼寧不貪物尚如此人可知已無故剪裁機婦織女晝夜勤勞千萬縷方成寸匹非甚不得已何忍剪裁至羅綺之類尤宜珍惜古人謂一片之衣千蠶之命今世于綾錦縀匹視為泛常獨不念及於此乎永樂十二年上坐便殿裏衣袖敝垢納而復出侍臣贊聖德上曰朕雖日易千衣亦可但念當惜福耳夫以天子之貴猶思惜福何况士庶自俗尚不古士庶之家競習奢靡至有以乳哺之年便衣錦著帛者其為暴殄尤甚恆見閭巷中履穿衣敝之子半屬當年紈袴之兒折福招報感應不爽深可畏也獨不聞袁了凡內人之說乎了凡初無子後生儼其母為作冬襖將買絮公曰綿輕暖家中自有何必絮母曰貴絮賤吾欲以貴易賤多製絮衣贈族中寒無衣者公喜曰誠如是此子夀矣後儼登進士不獨夀而且貴凡為父母者為幼子惜福當以此思之非禮烹宰養親祀先敬賔諸大禮所在或不得已而烹宰若徒供口腹致害生靈其罪大矣蘇東坡曰豫少不喜殺生近始能斷有餽子蟹蛤者即放江中雖無活理庶幾萬一便令不活亦愈於烹煎何忍以口腹故使衆生受無量怖苦胡廬山曰世儒語不殺生則必為曰佛教是亦未考於聖人之訓也禮曰天子無故不殺牛大夫無故不殺羊士無故不殺犬豕無故不殺則有故而殺者無幾矣孟子曰見其生不忍見其死聞其聲不忍食其肉夫見殺聞殺不食則不出見聞而食者亦無幾矣孰謂聖人之教全不戒殺乎今人殺心未斷惡業日增或一餐而斃數命或一羹而傷百生或生蟹投糟或養魚造膾或取嫩胎或食脆肉百計烹熬難可名狀姑無論殺業滿前昭報不爽試一深思冥念安忍殘毒至此也至于六畜之中惟牛最苦私宰耕牛律有明禁尤宜永戒元帝垂訓曰夫牛者上天元武之精下土太牢之氣非郊祀不敢用非天神不敢歆其形上應天星其力下興地利有功於世無害於民殺之者國有刑法食之者幽有禍愆牢字從牛獄字從犬不食牛犬牢獄可免太乙牢山俱有真形食之三日魔神攝精戒之三日名上玉淸牛食百草與人何害人食百物牛犬可戒居官者循是說而多方禁約功德寧可思議乎散棄五穀散拋散也棄浪置也五穀為天之所生所以養人何可散棄散棄者或在田拋撒而不收或在倉使之朽爛或置之踐踏之下或委之水火之中以致天降凶荒水旱洊至飢饉之報皆自取也昔劉元真於終南道中逢一貴人呵從甚盛元真問何往答曰某山神也上帝以麥大熟人不知愛使降霪雨收其半耳既而果然則五穀其可輕棄乎天府吏魁沈判司屢世敬奉元帝一夕夢帝謂曰家人拋棄五穀罪歸家長汝奈何聽家人狼戾全不覺察數日大厄至矣夢覺入厨下視之果然沈判令家人盡出泛湖約以湖上相候家人出乃淨淘溝中棄飯加椒菜為炊以待家人日晚候沈不至怒歸餒甚爭取食之踰數日方道其故家人由是相戒沈竟無恙勞擾衆生我身欲安孰不欲安我身欲樂孰不欲樂若以安樂自處而以勞擾待人真不仁也宋熙寧間新法方行民苦煩擾邵伯溫初入仕請教於程明道先生先生曰凡奉行官司文書於其急處能寬一分民受一分之賜此誠仁人之言哉明成化間朝廷好寶玩中官言宣德朝曾遣王三保下西洋獲寶無算上因命兵部查西洋水程時劉大夏為部郎中先匿其冊尚書項忠使都吏遍檢不得公語項曰三保下西洋時勞擾軍民死者萬計縱得珍寶何益舊案雖在亦當燬之何足追究有無耶項降位揖謝指其位曰公陰德不細此位不久屬公矣後果為兵部尚書劉夢震曰玩衆生二字所該甚廣非單指百姓也百姓其一耳破人之家取其財寶事出無心偶至破之惡已不小況為之寶而破之乎浙江米信夫為人狡柔里有大家兄弟爭財因唆弟訟兄結合官吏破其家而有之兄弟俱抑鬱死信夫由是富二十餘年至元戊寅遭反謀牽連結訟到縣見吏儼如其弟抑令招承忿而訟吏於府見府吏儼如其兄復抑令招承家産既罄與妻女子息八人俱死於獄亦有人取我財寶而我不忍破其家者海門崔鐄以稅金五百兩付鎔工工欺其無證而負焉鐄變産以償後王端毅公為守廉得其狀命訟工對曰鐄家已破若訟之是又破一家也鎔工聞而感愧遂舉前金還之鐄子潤孫崑曾孫桐相繼登第決水放火以害民居長春真人曰修橋補路拯溺救焚皆大方便事凡人遭遇水火正當竭力救護若決水放火以害民居寧為上帝所容乎宋楊丙所居近河嵗積芻茭幸河決賣以取利因屢誘奸民穴堤郡官趙昌言知其事一日值秋潦堤吏告急昌言命吏竟取丙家芻茭以充堤用將丙送獄根勘伏罪此決水害民之報李轅最孝母一夕有客來投宿轅適臨溪烹雞既具飯不以供客客怒不食轅曰母病思肉故烹一雞不及君也客愈怒而出是夜屋後火起將及廬忽天雨反風火滅鄰人奔視見客卧火中火炬猶在手人已死矣此放火害民之報若乃護堤防水亢旱防火此有司之職苟為有司者因循怠忽致民居有漂沒塗炭之災較之決水放火者亦豈有異紊亂規模以敗人功此與毁人成功有別一則功已成而毁之一則功未成而敗之一則傾危排謗明示其毁一則肆志紛更陰敗其功也規模如一切律令政教之類凡人作事不知如何籌畫然後定為規模此雖一人之功而天下之安危得失或皆賴之若亂其規模致功業立敗罪莫大矣昔寰朔之役楊業奉命進討時𧶂正攻寰州業與監軍王侁計曰我師一至𧶂必悉衆以迎公等伏兵石碣谷口吾引賊至此縱兵擊之必獲大勝既戰侁乃以賊為巳遁欲爭其功引兵而去業至不見一兵遂受擒非侁沮之功巳成矣王侁當為業兵臠食斯須而盡損人器物以窮人用器物如耕之犁鋤匠之斧鑿武之刀仗文之紙筆之類即器物極小而用所必需皆不可缺今損其器物令之臨用無措心術壞矣寧無罪報朱少傅國楨曰浙有二生俱春秋有名秋試前一夕一生密取彼生謄真筆嚼去其穎及入場抽用已盡秃矣慟哭欲棄卷出假寐間覺有促之寫者起視筆依然完好寫畢仍秃筆也交卷至二門遇彼生迎問曰佳卷得意否謝曰但得完卷耳其人面發赤明日嚼穎生貼出不得終場秃穎生竟魁選可見損人器物徒自損耳何損於彼見他榮貴願他流貶凡民有四而榮貴者獨出其上得到此地皆非偶然或由夙世培植福基或由祖宗積德所致見之者正當追慕其前修豈可妄生惡願且願之流貶能即流貶乎徒自造意業耳宋盧多遜貶朱崖李符謂趙普曰朱崖雖在海外而水土不甚惡春州雖在內地而至者無生還曷若改竄春州普不答未幾符亦坐事竄宜州上怒未已或以符語奏上即日將符改竄春州到未浹旬而卒願他流貶者鑒此或曰此是口出惡言不止心生惡願矣曰人有惡心必有惡言觸事即發總由心起彼心生惡願者但未適逢其會耳設使適逢其會能不肆其毒害如李符乎故太上於此直從源頭起處勘之如願人有失願他破散願他身死起心私之便生咒恨等語皆是此義見他富有願他破散人之富有乃其福命或由前生布施作福而來此可敬不可妒也抑或苦心勞力經營起家飢不敢食寒不敢衣及其既富常受衆怨此可憫不可妒也縱使富而不賢會有敗時在我何可起心願其破散虹縣周義夫富而恣橫同郡孫識之常從容勸戒義夫輒怒罵識之恨之曰吾且伺其敗也後義夫以事繫獄適識之登第為本路漕官竟處死籍其家未一載識之家遇寇一旦破敗無異義夫夫識之且伺其敗一語所謂願他破散也後事權在手竟如其願而行甚矣惡願之不可發也如此夫見他美色起心私之諸惡業中惟色易犯敗德取禍亦莫過此嘗即百惡淫為首一語思之世間惡業無窮何至以淫為最蓋淫念一生諸念皆生邪緣未凑生幻妄心勾引無計生機械心少有阻礙生嗔恨心欲情顚倒生貪著心羡人之有生妒毒心奪人之愛生害殺心廉恥喪盡倫理俱虧種種惡業從此而起種種善願從此而消故曰百惡淫為首夫一動淫心未必實有其事已積惡造罪如此况顯蹈明行罔知顧忌者耶陰律云姦人妻者得絶嗣報姦人室女者得子孫淫佚報世有忠厚善人而身後不昌才士文人而終年潦倒者其病皆由於此今欲斷除此病當自起念時截斷病根太上不言私他美色而言見美起心意可知已昔陸仲錫生有異才年十七隨師邱某居京對門一女甚美仲錫與其師屢窺心動師曰都城隍最靈汝試往禱或當有合遂禱之是夜夢與師俱為城隍所追大加訶責命查其祿位吏檢簿陸某下注甲戌狀元邱某下無所有曰陸某奏聞上帝削其祿籍邱某抽腸夢甫醒而館僮敲戶報邱先生絞腸痧死矣後仲錫終身貧賤如神言夫人淫心一動神鬼森羅巳無不察即不瀆告神靈能不為神靈譴責乎善乎謝上蔡之言曰天道禍淫不加悔罪之人人能悔罪則邪念日消自能當境操持矣試舉一二能持者言之曹鼐初為泰和典史因捕盜獲一美女於驛亭意欲就公公奮然曰處子可犯乎取片紙書曹鼐不可四字焚之終夜不輟天明召其家領回後殿試對策忽風飄一紙墜硯前有曹鼐不可四字於是文思沛然狀元及第王華餘姚人館於富家夜深有一妾出奔公不納妾出一帖示之蓋主人親筆云欲求人間子公批其後曰恐驚天上神次日即辭館去明年富家設醮拜章道士久不起主人訝之道士曰適至天門見放來春狀元榜問記名否答曰未見名只見馬前彩旗上書欲求人間子恐驚天上神二句次年狀元及第果王華也羅倫赴會試舟次姑蘇夜夢范文正公來訪曰來年狀元屬子矣羅謙不敢當公曰某年某樓之事誠動太淸以此報子耳羅因憶昔年曾拒奔女於此樓夢當不妄及廷試果然若此皆報及其身者鎮江靳翁年五十無子訓蒙金壇其妻鬻叉梳買鄰女為妾翁歸因置酒於房謂翁曰吾老不能育此女頗良或可延嗣翁俯首面赤妻出反扄其戶翁踰窗出曰汝意固厚但此女幼時吾嘗提抱之今不可以辱遂謁鄰人還其女次年夫人生文僖公十七嵗發解位至宰輔餘干陳醫師嘗醫活一貧士士感之一日薄暮假宿其家值士出館母命婦伴陳宿報德陳拒之婦曰姑意也陳曰不可婦强之陳連曰不可不可後幾不能自持遂取筆連書曰不可二字甚難天明乃去後陳有子為士應鄉試考官棄其文忽聞呼曰不可復閲其卷又欲去之又聞呼曰不可不可因細詳其卷決意棄去忽聞大聲連呼曰不可二字最難考官不得已録之揚州高尚書父販貨京口客寓中時聞息香撲鼻一日忽見壁隙中伸進一枝公從隙窺之見一少女獨坐次日公訪之主人即其女也問何不字人答曰擇壻難耳數日公訪得一壻白主人曰吾見高鄰某郎甚佳欲為令愛作伐何如曰吾意亦屬之但其家甚貧恐畢姻後不堪作家計耳公曰不妨吾當借資與之是日即為說合贈數十金公歸夢神語曰汝本無子今賜汝一子讀書可命名銓踰年果生一子後登進士仕至尚書若此皆報及其子孫者大抵人之一心平日能持則當境自定從來有平日搖搖當境能不染者也今人於色界中未見則先思見既見則欲貪見枝牽蔓引必欲陷入火坑而後快彼云人禍不及我謂天刑難逃矣蔣善曰見色起心固屬不可至於言之聽之尤宜謹戒蓋邪䙝之語最能炫惑人心言者不知其非聽者方以為快其實是自生煩惱徒多罪障也劉夢震曰凡人談及淫蕩之事人皆樂聽若能援引果報曉勸愚蒙亦何嘗不造福利獨不聞如皋冒起宗之事乎起宗為諸生時讀書暇輒莊誦感應篇戊午入闈病甚昏憒中竟不知何處下筆及登鄉薦赴督學親供見墨卷字端楷如常疑有神助巳未下第歸發願增注此經因念好色損德尤甚於見他色美二句下備列報應以誡世人時孰師羅憲嶽助寫後憲嶽歸南昌戊辰正月夢道粧三人一老翁中立二少年左右侍老翁手持一冊左顧曰爾誦來羅竊聽愕然曰此冒公感應篇見他美色下注語也誦畢老翁曰刻中復右顧曰爾咏詩即咏曰貪將折桂廣寒宮那信三千色是空看破世間迷眼相榜花一到滿城紅羅醒即作書併詩寄其子及榜發公果登第八月公歸其子呈羅書惟詩中榜花二字不可解後偶閲一書有云唐時禮部放榜姓氏稀僻者號榜花乃知冒姓實應之後官至憲副觀此則色之一關可不愼哉我願世人寧甘朴拙莫羡多情縱有邪緣且思陰報若謂腐言不堪入耳豈往事盡屬虛誣自病自療惟在發其源而治之可也負他貨財願他身死負者乏時借用久而不還也中誡經曰缺他債負目下未還常思憂負勤思還之若以不還之故至願其死現生便是豺狼來世寧逃犬馬亦愚甚矣永嘉徐輝嘗借丹陽一大商千餘貫未及償而商死商家不知亦不復索後輝生一子甚聰俊輝切愛之八嵗大病召醫市藥貨財耗盡而病不減一日忽語所親老尼曰我欲歸去尼曰此汝家也汝復何歸曰我丹陽人也徐公貸我錢千餘貫幸我死不償今來取之耳言訖遂絶夫輝無願商身死之心不過因其死而私幸耳且還報不爽如此彼願其死者又當何如乎千求不遂便生咒恨干求如求升薦求財物求寬宥之類不知愧恥惟務干求已非美德若不遂而咒恨尤小人也抑思我知求人本非正理安能必其遂意此不遂之根原自我帶來何關於彼故咒他實自咒耳陝西夏縣張甡性好夤緣少不遂其請則百端嗔怒詛咒誹謗無所不至後七竅流血而死咒恨之報應當如是見他失便便說他過失便即失意之事也人生百年豈能事事如意有失便處或是數之已定或是變之偶值若見人遭此即摘他平日短長謂宜有此失意事是為幸災樂禍能無報乎李熊以文行著名有疾不起妹壻何時揚言曰此郎素負能幹今日如何聞者莫不薄其為人逾年時亦死豈非口舌輕薄之報乎至於後學之士往往以成敗輕議古人尤為可笑班固作漢書謂司馬遷博物洽聞而不能以智自全乃固以黨竇氏竟拷死獄底視遷之宫刑更重范瞱作後漢書論班固身陷大戮智及而不能守乃曄以謀逆故竟殞厥宗視固之得禍更慘人之智如目睫然能見人不能自見大率類此不可不戒見他體相不具而笑之人生四體殘缺相貌不備謂之天刑見之者正當生悲憫心何可訕笑訕笑之根起於輕侮種隙深矣孫文懿公貌陋赴試京師縣令李昭言戲之曰似君人物有幾人耶是年聞懿以第三人登第未幾判審官昭言方以選人赴調一見大慚遂解綬歸古人形奇貌劣者多至大貴徒以外貌取人豈不盡失乎見他才能可稱而抑之前曰貶正排賢又曰蔽人之善又曰挫人所長貶與排無論已蔽則猶有幽錮之意挫則尚有摧折之慘此則又進一層曰見他才能可稱而抑之蓋可稱而不稱即是抑也較前二條罪似少輕而推勘愈細太上之憐才何其至乎大抵天生才能不能自顯於世必有為之先者稱道而表揚之今可稱不稱不抑而抑是逆天矣逆天不祥豈得無罪昔龎士元性好奬借或過其才人問之龎曰方今世教衰微善人常少不美其談即聲名不足企慕而為善者益少矣今拔十得五猶得其半以之興善長俗不亦可乎世之為考官持世教者念此埋蠱厭人厭制也埋蠱厭人是刻木埋之於地畫符咒以魘制人也按元都律考之人生為巫覡皆是先世獲罪之人今又為人行魘制之術是愈增其罪矣然有起心而使之為者其罪更甚於巫昔呂用之伏誅軍人發其中堂得一石函內有一銅人身被桎梏背書高駢姓字是以高駢每為用之所制噫高駢既為用之所制用之奚為又及於戮當如埋蠱魘人未能害人適足以自速其禍也用藥殺樹一草一木皆具造物生意故高柴方長不折孔子稱之佛家亦謂樹木年久者多為神鬼所棲不可輕伐伐之往往得禍夫伐且不可况用藥殺之乎用藥殺之者或他人之樹已不得伐而暗用藥以殺之也近有一人家因鄰宅大樹一株遮礙風水乃暗用皮硝皂角水灌之樹死兩家俱敗則用藥殺樹果何利乎恚怒師傅前云慢其先生此復云恚怒師傅蓋恚怒之罪更甚於慢也古人事師之道無犯無隱凡有所教皆當虛心和氣以受之何可恚怒恚怒者必是薄德無福之人也抑尊師重傅太上之訓人為子弟者固然然為師傅者亦當自盡師傅之職乃世有浮薄之士受人子弟重托而終朝燕惰虛糜館穀或改真作僞欺䝉父兄甚者引誘頑徒作諸不肖誤人子弟如此則其獲罪於太上更不待言矣昔鄧至為孰師教人以誠熙寧九年神宗御集英殿第進士至長子綰為翰林學士侍立上前及唱名至其弟績綰下殿謝又唱至其二孫綰又下殿謝上顧而笑王恭公從旁贊曰此其父鄧至盡誠教人所致也嗚呼為人師者可以法矣抵觸父兄父母生我劬勞辛苦長養教誨冀其成立以是恩德昊天難報可抵觸乎兄弟分形如手如足一切痛癢無不關心苟或相傷是傷父母可抵觸乎即或父有偏私兄有侵凌只宜委曲解喻反身自修萬一父兄執迷不返亦須和氣平心久自調洽若少有忿氣至於抵觸根本既虧鬼神必厭絶之矣昔張義每旦必告天消平生罪過一日被攝至陰司陰君示以黑簿簿中罪目一一皆已勾破惟餘一事不勾細視之乃義幼時於刈禾處張目反顧其父又微罵數語以此不赦蓋天律不孝之罪不通懴悔故也義大懼即日削髮為僧入山修道臨潼殷貴兄殷富貴素欺兄嘉靖初死死三日復生匍匐向富叩頭曰弟今後再不敢欺兄矣富訝問故貴曰貴始病革被卒拽赴城隍廟跪階下殿上厲聲曰汝何得欺兄罪杖百鬼拽貴下將行杖貴惶懼大呼曰貴愚䝉自今改過即聞殿上曰汝果能改姑免杖放還見鄭優一家皆被拷掠痛聲不忍聞因一跌而寤隨問鄭優家皆疫死矣此可為抵觸者戒按抵觸二字凡語言詞氣之間微有不順即謂之抵觸但比之暗侮則加甚耳强取强求分所不當得而必欲得之故謂之强以人供我曰取以我于人曰求四川張御史語所親林繼曾曰子昔按雲南時夜獨坐有朱衣人現前曰某為公守藏神待公久矣子曰金何在神指座下視之果有白金千兩因語神曰御史豈得携此神曰願得鄉貫帖送至公家子書焚之神遂隱比復命同年某託薦一官强納二百金歸而夜禱前事神復至僅存八百金問其故曰某同年金是也悚然愧謝强取者鑒此臨安沈一性最貪開酒庫於錢塘門外一日將二鼓有貴公子五人來飮沈意其為五道神也叩求曰得遇尊神一生遭際願求小富貴客笑曰不難令一卒負一囊授沈沈拜受摸其中皆酒器也急携入城又慮有聲為人詰問悉隔囊捶匾歸家喜謂妻曰我得橫財矣妻開視驚曰此似吾家物因啓篋驗之皆烏有矣沈大慙强求者鑒此大抵世間一切得失皆有定數數不當得即以父之財子亦不得而有之况可强之他人耶嘉興一賈人積銀數百兩貯磁甕以金叉二股置上埋地中出商於外不料其子窺見竊發之視甕中惟淸水一泓耳以手探之無物封蓋如故父歸發甕問妻曰吾藏金誰曾發耶吾所置金叉在上今在下何也後子言其事因共嘆息好侵好奪以詭計暗取曰侵以勢力明取曰奪又侵則所取少奪則取之盡也此皆損人利己之事何可孳孳好之既好侵奪則所侵所奪者自難消受暗裏填還將必併其本有者皆失之矣畢昶以苛刻立業凡田産與之相鄰者百計欲侵之及其有急而賣則陽拒之曰我不欲也既復使人陰鈎之及至則又曰我實不欲也其人無奈只得減價以就及成契則又曰我銀不便期以某日來取及取時或以色銀或以米穀凑而與之原數併不得全平生所為類如此後昶長子以人命繫獄破産而死次子流落乞丐死於他方嗣竟絶此好侵之報也林達為人姦柔里有墳地一區風水甚吉達思圖之乃僞立文劵稱其父未故時賣與某不能辨嗟恨而已達遂遷其父葬之是夕即夢父語曰福地在心不在墳塋安有奪人之地而子孫得享福利者乎今絶祀矣未幾達死其子亦死此好奪之報也按侵奪不止田地凡一切貨物皆是虜掠致富虜掠如乘客人被溺撈取貨物皆因人家失火剽竊資財或因賊寇經過乘釁劫掠又其甚者如為官吞剝百姓盜用公帑為吏科斂民財偷取庫藏皆虜掠也以此至富焉得受享巧詐求遷遷升轉也士君子既登仕版便當忠直存心今求遷而濟以巧詐則其心術不端甚矣况人生功名利鈍落地已定即營營終身何加毫末徒為鬼神訶責耳西溪龍霓在京邸同年某行人過之告以將避湖廣楊暫注門籍霓曰湖廣非遠差况尊翁在堂便道歸省豈不善反欲避耶行人曰不然吏部將選科道若承此差恐不得與選吾姑避之則揚子山當行霓止之不聽遂稱病注門籍才一二日吏部即開選行人勢不可即出楊竟應選得吏科給事中行人仍得前差徒自恨而已噫一以巧詐求之一以不巧詐得之世間凡事似此者極多豈獨官職賞罰不平前云賞及非義刑及無辜是賞罰俱不當也此云不平者謂均之一賞而多寡任意均之一罰而輕重狥私為不平也賞罰既不平人心必不服積怨招禍率由乎此故太上又以此為戒逸樂過節國語謂民勞則思善逸則思淫是不欲人逸也孟子謂人生於憂患死於安樂是不欲人樂也况逸樂可過節乎過節亦非必驕奢淫佚凡志氣昏惰貪戀安享以至服食日用不遵常度皆謂之過節逸樂過節不促算則招殃必然之理也范文正公嘗言吾每夜就寢計一日飮食奉養之費及所為之事若相稱則鼾睡熟寐苟或不然則終夜不能安枕人能存心敬畏如此又豈有逸樂時耶南蘭黃含仲曰人無夀天祿盡則死是以一生財祿皆有定數服用之際豈宜過享譬如人有錢一千一日用盡則明日無有一文若日用一百則可至十日日用五十又可至二十日凡人惜福當作是觀苛虐其下居官而酷責吏民處家而過撻婢僕皆苛虐也居官法戒前已略見矣請得專言處家之義洪州司馬王簡易得腹疾中有塊隨氣上下既絶復蘇謂其妻曰吾舊使小奴偶因約束太嚴遂至斃適至陰司被小奴持訴不可解今腹中物正彼作祟吾不久矣妻曰小奴安敢如此曰陽間有貴賤陰間則一般也未幾果卒嗚呼孰謂奴僕下賤遂可任吾苛虐乎即主僕之分宜有貴賤念彼父母深憐痛惜豈不相同一旦勢不得已沒身歸我割肉剜心已自難忍我復從而苛虐之豈有人心者所為試一返觀我之兒女供人打罵我能忍乎筋疲力盡我能忍乎一旦有疾幽置別室我能忍乎我不能忍便知他人父母亦復如是是以苛虐之事仁者不為也昔楊誠齊夫人年七十餘每冬月黎明躬詣厨下作粥一釜遍給奴婢方令服役其子東山請曰天寒何自苦如此夫人曰奴婢亦人子淸晨寒冷須使腹中有火氣乃堪役使耳古人愛恤下人如此真可為法戶部尚書馬森父年四十止生一子甫五嵗夫妻寶之婢偶抱出門失手跌傷左額死封翁見之呼婢奔避自抱死兒入太夫人驚慟幾絶撞倒封翁者數四索婢撻之無有婢歸母家日夜祝天願公早生貴子次年遂生森左額宛然赤痕也夫奴僕犯罪之大者孰如死其子此事尚可恕又何事不可寬乎袁氏世範曰奴僕下人天資多暗作事多乖又性好忘囑之以事全不記憶又性多執不是自以為是又性多戾輕於抵對不識尊卑所以主人使令動輒觸怒其言愈辨於是箠楚加之或失手至於不測者有矣凡為家長於使令之際有不如意當云天資愚蠢宜寬處之多教誨省嗔怒主人胸中亦覺安樂即或犯事當懲治亦不可親自鞭打惟徐徐責問令他人執而行之既已懲治呼喚使令顏色便當如常庶無他事至於婦人秉性褊愎不識道理其責備下人尤非丈夫比須是平日常以待奴僕之理喻之不可縱之撲打家中子弟亦不許擅打奴僕有事當令告之家長婢僕既欲其出力辦事不可不察其飢寒宿卧去處亦當留意冬時風寒夏日蚊暑亦須為之檢點庶幾仁人之用心也噫此論為家長者皆當手書一通置之座右也恐嚇於他恐嚇有二一是遇人急難不行安慰故倡其勢動其憂恐一是圖利修怨虛張聲勢使之怕我冀遂所欲皆是恐嚇與乘威迫脅者不同夫人有怖畏尚為曲為寬解乃反以危言恐嚇或致非命則孽自我作能無報乎李舜卿以佃戶張三缺租必欲令還致自經死孫季明以女使與小奴作過必欲根究致投水死雖其自殺實我殺之為其恐嚇使然也太上業報因緣經載此二事以為尤戒怨天尤人閻浮世界素號缺陷人安得每事稱心其不稱心者必因積纍薄而受享亦薄也於天何與於人何尤荊門楊大同素侈縱資産費盡貧苦無聊每怨天不公恨親不顧一日遇一少年云有一好處但隨我去不患不富貴遂隨至一所少年忽不見欲出無路忽聞數人大呌捉賊毆擊到官乃是半夜入一巨室不能分理遂死然則天可怨人可尤乎訶風罵雨疾風暴雨皆有神主之禮曰若有疾風迅雷甚雨雖夜必興衣服冠而坐蓋畏天之怒也今無知之民雨多則怨潦晴多則怨旱風烈則怨暴不思陰陽愆數俱各方造孽所致乃敢呵罵之能無愈增罪逆乎鬬合爭訟見人爭訟善言勸解使兩得安樂功德不小豈可三言兩舌面是背非鬬合成乎崔煒於開元寺見一乞食老嫗足蹶覆人酒甕被店主毆擊煒趨解曰酒直幾錢曰直一貫煒脫衣代償老嫗不謝而去異日遇諸途乃日蒙君解難吾不敢忘吾善治贅疣今有越井岡艾少許相贈若遇贅疣一灼即愈其後遇一僧贅垂於耳依法愈之由是知名延之者衆遂富或曰老嫗即鮑姑也由此觀之見人爭訟不當解釋耶永福縣薛敷工刀筆每代人寫詞狀翻亂是非由是積有中人産一日請道士鄭法林設醮法林伏壇下良久起言表尾批云家付火司人付水司不知何故逮旬月室中無故失火家財燒盡敷挾巧筆欲過江湖口中流桅折擊身墜江而死則鬬合爭訟獲罪不小安可不戒至於訟息止爭尤是當官第一事有民社之任者更宜留心也鄭瑄曰今人詞訟到官多是生事造謊一人訴詞必牽引多人以為未辨是非且得追呼一擾耗其錢財耳則反坐之律可不嚴乎嚴反坐之法則虛妄者知警而訟自稀矣然又有法焉訟期宜少宜緩蓋人有一時忿激便欲投詞需日稍久怒解事定必有和勸而不復來者此亦息訟之一義也妄逐朋黨胡嘉棟曰君子原無黨小人欲逐君子以快其私必借口朋黨一網打盡然得志未幾而天災人害未有不並至者如曹節王甫已事可鑒也按此則逐為屏逐之逐劉夢震曰逐隨逐也朋者五倫之一黨欲何為不過借衆以凌寡濟惡以欺善利盡則疏勢盡則散一或妄逐未有不墜坑落阱者上而士大夫下而後生小子皆當痛戒也此句緊接鬬合爭訟句明是小人分門別戶互相攻排曩作屏逐之逐者非也愚謂長公說為是用妻妾語妻妾為人內助苟有善言正當從之但婦人賢明者少愚暗者多且其性多褊愎不耐事情又巧飾短長語似中竅故為丈夫者易於迷惑或畏其悍戾惟命是從或惜其嬌癡有言必聽近則一家離心遠則終身受纍敗亡之禍率由此已洪武中下詔褒鄭濂纍世同居徵至京師問其治家之道對曰惟不聽婦人言帝深嘉之則妻妾之語其可用乎王經事繼母不孝奉養殊缺經有二子相繼暴卒經亦喪明始悔前非每自言曰此皆水邱婦教我至此後經卒水邱婦病癩亦卒靑田居民倪九惑於婦言謂其生母原為婢妾不認其母終嵗置母庖爨下略如老婢而身與妻子安享自如時新穀方熟令母烹雞治飯飯未熟忽暴風疾雨有大石自山巔裂墜正壓倪九寢室石復破壁而去一夫一婦一兒皆斃焉陳中洲快其事作誅逆巖記夫用妻妾語而背父母此固其罪之大者至於離間兄弟侵欺鄉黨偏私兒女凌虐婢僕種種惡語又當隨事省察若夫聽信妾語薄棄正妻尤人情所易惑而不可不愼者太上因妻而及妾有以夫違父母訓父母生育功侔造化既生矣湔濯以時乳哺無缺推乾就濕慮病防危悉心護持然後成人既成人矣又須男教以學女教以工漸漸長成婚嫁時至擇婚辦嫁耗損精神事尚未周晚景已逼人命無常流光易失今日維存明日難保萬一蹉過生死永隔即欲訓誨胡可得耶况天下無不是的父母其諄諄教訓無非望我成立即使鞭撲頻加終是愛我念我今乃肆行己意有言不從或浮沈順之陽受陰拒此等不孝之罪真為天地所不容矣昔鵝湖費宏為翰林時與關中某同年對奕爭勝戲批其頰某不悅公悔日往請罪終不出費封翁聞之大怒乃封號一竹板送至京邸令公自撲公持父書及竹板登其堂自撲三次某始出抱頭而哭公訝問故某曰公尚有父督責我求督責我者不可得也於是大慟自此相好如初噫不違父訓如費公者誠人情所難而關中某公數語亦令人悚惕之至矣得新忘故天地間新故相推人物皆然小而衣服器用大而親誼交情皆有新故新者終成故故者昔曾新可遽忘耶天順中都指揮馬良最為上愛妻亡上每慰問適數日不出上怪之左右以新娶對上怒曰這厮夫婦之道尚薄豈能事我耶杖而疏之今人於妻妾間得新忘故者多矣鑒此可發深省口是心非心口皆是純善之人也即心口皆非人猶得而防之惟言稱堯舜心同桀紂口誓山海恨深吳越者最難測度以此而誑庸愚陷同列何所不至世間大蠧正在此輩死而抽腸拔舌又何說之辭昔庾道季久病設醮祈祐保命真君判曰庾道季平生為人心口不同自少及長善功無一罪過已定死在旦夕佞神求免得乎數日果卒貪冒於財欺罔其上索取無厭曰貪昏昧無耻曰冒人臣持已以廉事上以忠乃大節也今以貪財之故至於欺罔上人大節安在縱令一時富貴子孫其能久享乎紹興某布政巧於貪叨及敗官歸買田十萬畝富甲一郡止一子一孫淫賭無節皆夭死布政復染癱瘓不數年間家資已盡矣將死時忽瞪目口吟曰我官至布政不小田至十萬不少我手中置我手中了不曉吟畢遂卒歸安仰思忠精於堪輿六合尹林克正延之入閩為其姻某氏葬父得一地甚佳方點穴間雨驟至遂下山是夜思忠夢一老人告曰此地切勿與某此人為考官賣三舉子當有陰禍若葬此地非天意矣思忠明日訪之果如夢中所云遂託故辭歸越二三年問其鄉人則某氏與勢家爭墳地致死人命官司牽纒至今未葬家業亦凋落矣造作惡語讒毁平人人縱有過亦當曲為掩護若本是平白無辜之人而乃編造流言揑作穢事亦讒毁之豈得不反招惡報乎陳良謨曰余昔參楚藩時公安縣白教諭㑹試入京有太和山道姑造衙化緣其妻以教諭名書簿施銀一兩又與紵一丈繡幡甫去而同官妻過訪曰適疏簿乃上司出給者見儒官與道姑往來恐為纍不小白妻信之急令人追尋不獲旦夕怏怏比教諭下第回取紵裁衣却又剪動益不自安遂自縊死後撫院林公㑹議賢否冊謂余曰白教諭姦學吏妻其妻有言勒令縊死豈非狗彘余曰然乃述所聞以告公沉吟間余曰未審前言得之何人請更訪之公幡然悟曰是矣是矣即奮筆抹去考語白因得升國子助教余轉官閩臬見林公於莆田公指鄰家曰此吳姓者向為公安訓導毁白教諭者是也後升萍鄉教諭亦為同僚譛歸過鄱陽湖舟幾覆僅以身免今且無聊矣吁昔自謗人今為人謗報施之說豈不信然毁人稱直此所謂訐以為直者與造作惡語者不同夫正直之人心本忠厚當言即言使人知改所謂直也若毁者污人之名快己之怒薄德已極而猶託言直道以竦人聽豈不可恨程伊川先生曰君子於人當於有過中求無過不當於無過中求有過今之好譏議人者每每舍長取短以為快樂存心正直之人固如是乎顏茂猷曰有一等人見人為善不毁曰腐儒則毁曰是齊公一流不則又毁曰姑息柔軟養成人惡又有一等人以己度人見人為善不毁曰釣譽沽名則毁曰希求福報甚或毁之曰假公濟私種種惡語加人方且自謂口快心直神誅鬼殛知不免矣犯此病者盍自省之罵神稱正聖人教人敬鬼神而遠之何敢慢罵罵神已大悖聖人之教矣尚得謂之正乎其為鬼神譴責斷斷無辭已鎮江定波門于某幼子痘亡于憤甚寫一狀詞欲向城隍廟告痘神其妻奪向竈下㷊之是夜夢城隍責曰汝家竈神申汝有狀告痘神汝小民無識姑薄懲之發送楊知縣責十五板明日丹徒令楊蜀亭從定波門出于門首弔搭礙破官傘即時擒出當街責十五板病月餘始愈頴上高天佑同二生赴試金陵聞雞鳴山守源禪師有道行齊往謁之師曰三位皆當中惟高君不能矣以途中用楞嚴作枕故除名耳高愕然始悟經在匣中以匣作枕不知請出也比榜放果如所言高後以明經官至州守夫䙝瀆經典受罰如此彼罵神之罪又當何如乎棄順效逆君義臣忠父慈子孝兄愛弟敬所謂順也少凌長小加大賤凌貴遠間親新間舊淫破義所謂逆也順則宜從效之逆則宜棄絶之今反棄順而效逆豈非速禍之道乎南極夀星真君曰天道福善而禍淫神明賞順而罰逆人能刻意為善恭已順天則我命在我不為司殺所制苟或違天地肆愚悖侮神明反仁慈虧忠孝明則刑網隨之幽則鬼神誅之及將死而言善求悔亦不可得悲哉背親向疏孔子曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮今背親而向疏非因恩怨狥私即從炎涼起見悖德悖禮甚矣昔楊黼慕蜀中無際大士往訪之途遇老僧語曰見無際不如見佛黼曰佛安在老僧曰汝但回見披衾倒屣者即是遂回暮夜抵家其母聞扣門聲喜甚披衾倒屣出戶黼一見感悟由是竭力養親噫今世背親向疏者又不止一端如瞞背父母私託婦家視父母之親如泛常而待妻黨則甚厚兄弟錙銖必較而處朋友外人獨慷慨近情甚或本族貧寒不相顧而冒認他宗趨炎附勢如此之類何可勝數所願世人從此猛醒也指天地以證鄙懷鄙懷鄙䙝之懷也皇天后土覆載高深人即小心敬畏尚虞積愆不少何敢以下賤鄙懷妄指作證明明赫赫豈能任吾䙝瀆乎徒得罪於天無所禱耳李景遜母鄭氏嚴教諸子一日牆壞得錢一甕復掩之即㷊香祝天曰天地憫我母子孤苦特賜此錢然妾心惟願諸子成名錢非所願也後景遜果登第官至少保可見人有一念之善天地亦可作證特所指鄙䙝則大不可耳可弗愼歟引神明而鑑猥事猥者鄙賤之謂所為鄙賤輒呼神明鑒察是以不敢訴之官府質之朋類者反敢訴之神明矣豈不悖乎楊起元屢試春官不第奮曰得非吾念頭有差乎乃供文昌帝君像旦夕䖍禱曰有如志富貴不志道德為身家不為生民上負吾君下負吾親神明鑒之三年登第噫敬信神明有感必應如此知敬信之獲福則知䙝瀆之必獲罪矣蓮池大師曰神明固不可䙝而亦不可諂如祈求願心切勿告許宰殺牲牢之類此名惡願有業無功縱得遂心終有苦報乃至造像造殿袍幡供器只宜隨便喜助不可有心求福蓋大悲平等是佛正直無私是神豈有因賄降福之理若以理言惟在忠君孝親憐貧愛老救災恤苦戒殺放生種種陰騭種種方便隨分所能力行不怠耳由是言之神明尚不當諂之以求福况可引之以鑑猥事耶戒之戒之施與後悔周惠化好施窮困辛苦不倦一日智觀真人化為乞丏試驗其事周果樂施即日度之今為西華真人陽伯雍好施義漿一日遇一異人授以一升玉種子孫皆大富貴裴延年兄弟三人皆好施一日有老人踵門乞漿兄弟待之盡敬後安史之亂老人引入一洞中得脫兵難奚百三本貧者而生一贅一日見一道人詣鋪家乞一文錢鋪家不與百三乃自探腰間一錢授之是夜夢道人為之去贅及覺贅果落史秉直築室得金嘆曰財者人之命也既䝉天賜豈宜獨享盡散之貧者一家數口俱登夀考瞿嗣興樂善好施凡負販者必多償其直曰彼胼手胝足止求升斗自活吾何忍與之相較後享年八十四無病而終當知施與一事立功最速然必樂善不倦方有進步即或財力不逮亦須常存此心可後悔乎未與而悔之則不果施既與而悔之則不樂施雖有悔不同皆是善念轉成惡念均可惜也假借不還范益謙座右戒曰凡借人物不可損壞不還蓋借人之物非得已也既不得已則須愛護如己物用畢隨即歸還不特無厭於人亦且無愧於心至借貸錢財尤宜淸白豈可久而乾沒今世多有缺錢不肯還者不思財非吾財即留之亦終去銀既無有債又仍在佛家嘗云未了宿債死後當償其為驢馬牛犬生償其負者稗史往往載之茲不具述也朱璣曰世人通財於我本是好意往往因其追取反成仇怨吾不知此種人設心為何等也昔張孝基為某富翁壻翁止一子甚不肖逐出翁死遂盡以家財付孝基數年見其子乞於路召問曰能灌園乎曰得就食甚幸少自力復召問曰能管庫乎曰管園已幸敢望管庫久而視其謹願無復故態乃盡舉家財還之後孝基有友遊嵩山見孝基儀衛如王者詢其自答曰上帝嘉我還財一事命主此山言訖不見夫承受之財尚思還人况原繫假借者乎分外營求太乙真人曰豫有經六字人當受持一字經曰忍二字經曰方便三字經曰依本分人之所以不肯依本分者只謂營求可恃耳豈知人生世間富貴貧賤一定不移陰注陽受皆宿業也可分外求乎新平縣令裴璞素稱正直卒於官其友韋元方客隴右道遇璞躍馬來騎從數十驚問之曰吾職西川掠剩使專司世間財物之盈縮夫世間農勤求穀商勤求財士勤求祿只得本分所有不增本分所無不勤則併其本分失之矣故凡一飮一啄以至財貨少過其數吾皆得掠之此言營求得之事不惟無益反有損也歸安省祭孫邦華就選北上有姐夫某者亦以省祭赴選比選某得太原府倉官華以候選無缺且束裝歸忽姐夫暴死華乃語其甥曰爾父一生辛勤已矣顧文憑現在盍使我冒為之得資均分何如甥從之華遂赴任任滿共得七百餘金乃與甥中分之華自喜得計復入京投文聽選及拈籖則恰補其姐夫之缺勢不可復往矣涕泣而歸夫使邦華能安分待時則太原倉官依然自在且可獨專其利而將來遷轉又未可知今以一奸巧自失之豈非越分營求為神所掠乎可為炯戒已力上施設挾勢厚之力以臨人既已為人所畏矣又從而施威設法勢不使盡不已謂之力上施設如以長吏之力施設百姓以豪貴之力施設貧賤是也或曰不恤其力而驅使過迫即力上設施也淫欲過度邪緣外合滅德喪心太上固已垂戒於前矣至於夫婦之道人生所不能廢者尤有節度不當過縱董江都曰天地之氣不致盛滿不交陰陽是以君子甚愛氣而謹遊於房道書曰人身欲念不興則精氣散於三焦榮華百脈及欲想一起欲火熾然翕撮三焦精神流溢並從命門輸瀉而出可懼哉又按攝生之說二至之月宜戒大寒大暑宜戒日月薄蝕宜戒大風大霧迅雷暴雨宜戒又本命日庚申日甲子日丙丁日四立二分日二社日弦望晦朔日又每月十五日二十八日正月初三日十四日十六日二月初二日三月初九日四月初四日初八日五月三個五日六日七日名為九毒日十月初十日十一月草五日十二月初七日二十日俱宜戒凡此皆所謂度也彼淫欲過度者亦自求速死耳寧謂一死之後遂無冥譴哉心毒貌慈心懷狠毒外飾慈和此真人類之豺虎世內之梟獍也死入地獄必當永墮三途昔李義府貌極柔恭每與人言嬉怡微笑然陰賊無比人號之為笑中刀後竟竄死於嶲蔡元度對客滿面春風雖所憎者亦親厚無間人莫能測謂之笑面夜乂後亦不得其死按此則更甚於包貯險心者矣蓋彼止令人難窺此直令人相忘也穢食餧人餧人與人食也不潔之食人所不欲强以餧人是等人於犬彘人既嗔之神亦惡之矣宋翟永夀販米為業紹興乙卯間米價踴貴永夀於中路聞之乃取稻田水潤米不知其田已下糞矣少頃黑雲忽起震雷大作永夀知罪度必不免因探腰間錢一貫授與同行囑令歸遺其母作是語已天忽開霽夫誤用穢水潰米遂千天怒若非一念孝心豈不早斃雷斧之下乎左道惑衆不正之道謂之左道三教聖人道雖不同上者使人明心見性其次使人遷善遠惡未有好為詭異以惑人者凡惑人者皆左道也蓋人心多愚最易惑以禍福一為所惑因而生盜生姦甚則聚黨作亂及其事敗身首異處從無一人得免者遠無具論楊州近事可鑒也便益門外黃金壩一鄉愚擔糞灌園忽有數人誘之曰汝終嵗灌田殊勞苦耳吾有一術可致富貴汝肯從乎應曰唯因引至僻處盡授訣明日鄉愚方灌園忽狂呼跳踴自稱都天神下降大言不立廟祀我此方無遺類人因其愚咸信之先搆席殿奉鄉愚居稱之曰活菩薩云遠近聞活菩薩名日益集男婦雜𨓬不可以數計鄉愚終日默坐不飮食有所禱卜筊而已一切募化人願免災皆爭輸如是月餘官長無不知有活菩薩矣太守金公往按之擒出一鞫便伏立斃數人於杖下餘黨悉散殿立燼焉沃起鳳曰近日奸徒聚衆借名說法漁色賺財固該萬磔而為其所惑者聽其家之婦女源源入菴觀寺院以致宣淫露醜傷風敗化惡得盡無罪哉主風教者苟能亟為禁戒之亦未必非正俗之一助也短尺挾度輕稱小升自此至採取姦利皆言小人貪利之事也度者分寸丈尺之總名先王立此以量長短所以平人心之不平也今以短狹者量出勢必以長廣者量入不平孰甚至於稱升以須公平蓋細民日用為急即一文之錢得之甚艱故與人貿易稱不可輕升不可小輕出既不可則重入亦不可小出既不可則大入亦不可否則冒太上之禁失自心之平雷火之誅不旋踵而至矣周才美為子娶婦見其能令理家政付以斗斛稱尺各兩等諭以多入少出之法婦不悅求去曰翁所為有逆天道妾他日生子定不肖破家人謂是妾所生恐被玷纍才美悟乃曰依汝言及今改之未晚也婦問用此幾年矣曰約二十餘載婦曰如必欲婦留當反用二十年少入多出以酬前日欺瞞之數才美許諾後生二子皆登第江山縣祝大郎富而不仁所用斗斛稱尺大小不一忽有道人過門戒曰汝宜用心平等豈可如是今若有人來取斗稱等物家必有災是夕即夢二靑衣來取夢中付與既覺急尋之已失矣因憶道人之言謂災者火也即盡徙室中之藏於山上質庫方稍定庫地忽迸裂洪水湧出屋宇錢帛順流而下所居頃刻化為深潭至今呼為祝家潭以僞雜真僞者假也以假物作真物如鹽內攙沙酒中攙水之類此等事獲利固倍損德亦多德既受損則災禍至矣亦復何利至於使用假銀尤為誤人正德間俞翱嘗以鑽鉛假銀一兩八錢買四羊賣羊者乃一婦人不識也夫歸識之怒罵其妻妻忿縊死夫痛其妻亦縊焉不數日翱被迅雷擊死湖濱四羊亦死蓋其尸上此非假銀誤人之報乎又世間最可恨者貨賣假藥誤人更甚張安國知撫州日出榜戒曰陶隱君孫真人千金方濟物利生多積陰德名在列仙自此以來行醫貨藥誠心救人獲福甚衆曾見貨賣假藥積利起家自謂得計不知冥冥之中暗減其祿或身多橫禍天火雷震子孫非理破蕩蓋緣贖藥之人疾病急切將錢告買只望一服見效却被假藥誤賺反致損傷尋常殺一飛走猶有因果人命最重無辜被害其痛何窮噫此真所謂仁人之言也採取姦利人非謀利何以治生不能無取但取當以正可採取姦利乎姦利如私鹽私鑄以及一切屣船頭撞木鐘挑米過付之類諺云越姦越巧越貧窮姦巧原來天不容富貴若從姦巧得世間騃漢吸西風今採取姦利而自謂久長此必不得之數也孫南金以交結官吏致富晚年益多貪求凡人所不敢為者無不為之人所不敢取者無不取之忽有惡疾飮食不進枯瘠如𧲣及死乃作驢鳴云廬陵嵗旱龍昌裔有米將糶因天雨其價稍減昌裔為文禱於神剛廟更祈一月不雨焚訖還家憩道旁一亭俄有黑雲自廟後出頃之雷雨大至昌裔震死亭中人視之於髻中得一紙則禱廟之文也今之富家閉糴坐待高價者盍鑒此壓良為賤人家兒女皆謂之良奴婢皆謂之賤若本出良家而我以勢力强制之使為奴婢是壓良為賤也至賣良為娼罪重惡極又不必言矣昔鍾離瑾為德化縣令有女字鄰縣許令子將嫁買一婢為媵婢至背屏而泣詰之即前令女也瑾惻然乃以書寄許公求緩婚期日近買婢得前令女當用女裝先嫁之許答曰昔遽伯玉耻獨為君子君何自專仁義乎願以前令女配吾季子於是二女皆歸許氏以此陰德上帝賜瑾十任太守以夀考終彼反此而壓良為賤者豈不永受惡報乎謾驀愚人謾者欺人不知不見也驀者快捷伶俐之貌凡用詭計設騙令人墮其術中者謂之謾驀謾驀皆不可用而加之愚人則尤為可憐即愚人不能報冥冥之中豈無有憐其愚而代為之報者遂昌村中三人同行前臨一渡而舟在彼岸中有一人愚蠢乃使之赴水取舟其人脫衣下水出沒湍流僅而獲濟復撐舟來渡二人二人才登舟愚者忽腹痛欲泄急跳岸上二人竟撐舟去曰日已晚不及候汝矣俄而水急舟橫抵岸一觸舟覆俱溺死而愚者在岸無恙貪婪無厭以口取物曰婪言人之貪如口之食物無有窮極也老子曰罪莫大於多欲禍莫大於不知足夫人心之欲豈有限量知足雖貧賤亦樂不知足雖富貴亦憂昔胡九韶家甚貧課兒力耕僅給衣食猶每日謝天淸福妻笑曰一日三餐菜粥何名淸福九韶曰幸生太平之世無兵禍又幸一家骨肉不至飢寒又幸榻無病人獄無囚人非淸福而何此真知足者也又有不知足者南京守備劉琅鎮陝西歸資積無比復於私第建真君祠日講爐火方士知琅有玉縧環價值百鎰紿令獻神祈福遂併丹鼎竊去有人夜題其門曰堆金積玉已如山須向仙家學煉丹金鼎未成拋白璧真君原也愛縧環琅慚憤而死咒咀求直咒咀者誓於神也求直者求神速報也此不待入廟投詞凡忿爭之時呼天叫地者皆是夫事理本有曲直如直則日久自明何須急於表暴如曲則自反有愧安敢對神一為咒咀真忘命矣按咒誓章有云四方八面受人咒咀一切凶惡之鬼皆得乘間同隙行其禍害若非天神降解未易斷除則咒咀其可為乎世間狂悖小人明知所作非理猶欲誓神以塞其謗不思神明鑒臨豈容汝肆其欺悖往往慘絶橫亡竟有如其所咒而死者可畏也已嗜酒悖亂嗜好也四戒以酒為第一可飮而不可嗜世人嗜飮無厭以致氣昏心亂膽大心狂久且喪心敗德能使士敗名官落職農荒田夀商賈喪資可嗜之乎甚且有損肺腐腸因之招疾而死者蘇易簡為學士平生好飮因此衄血感疾而卒王全為殿中丞自恃量高一日大醉臍裂而死蓋嗜酒之人必至悖亂悖亂之人必不令終古人斥為禍泉指為狂藥其垂戒之意深矣骨肉忿爭天下凡事皆宜和平處之不當爭競何况骨肉佛云六度萬行忍為第一張公九世同居惟一忍字人唯不能忍所以多至忿爭人倫既傷天災必至自然之理也袁氏世範曰人家父子兄弟多有不和者或因責望太過或是分財不均或人之性情不一作事不齊或聽婦女之言彼此離間數者皆不和之根也若悟此理父兄子弟各盡其道父兄愛子弟不必責子弟之必順子弟敬父兄不必責父兄之必慈則情意之間自得和協至於財物尤宜打破富者當思吾財果是因衆成私獨擁不分心豈無歉果是自置財産分與貧者明則為高義幽則為陰德豈不勝於連年結訟虛費家資乎貧者亦宜自思彼實竊衆成家亦辛苦營運以至增益豈可盡分况實彼私財吾等占之寧不自愧苟能知此必無爭訟之費至人之性情或柔或剛或謹守或豪縱或喜安靜或喜紛更臨事之際一是一非自然不同唯各隨所宜不因我是求其必合豈復爭執婦人賦性褊愎其於翁姑妯娌之間大率輕恩易怨又有婢妾喜事者從中挑逗是非以為快樂是以積恨往往不解此在為丈夫者嚴禁婢妾不許傳遞語言同居之人往來行走須令曳履揚聲使入聞之恐適逢議我彼此生隙其妻妾有言雖或中情亦不可聽如此即欲忿爭從何而起此處家至要之論也洪武中有告鄭氏交通胡惟庸者吏捕之湜請行曰弟在其忍使兄罹刑律濂曰吾家長當任罪弟無與焉二人爭下獄上聞之謂近臣曰有人如此而肯從人為非耶宥而擢用之今之骨肉忿爭者總只為自己不肯喫虧耳觀鄭氏爭獄一事天下又有何事當忿爭者乎男不忠良忠者誠實之謂良者方正之謂萬物惟人最靈人又以男子為貴既為男子而奸佞不忠險僻不良豈不負此七尺軀乎朱璣曰古來忠良者多矣不能盡述唯取近今一二人以為勸可乎揚州諸生蔣應參字三去幼孤而貧事嫡母以孝聞為人端方正直幾微不苟自始冠至老未嘗一日釋冠對五經四書必斂容整肅教人以誠素奉佛戒殺好施每出必擕錢百文路贈乞丐未嘗以乞丐呼之呼曰貧民色甚恭其誠恪類如此先生有子名善字同菴聲重儒林丙子應鄉試其硃卷忽從衆卷中徐徐自出房師張公調鼎異之拔冠本房人皆以為先生忠良之報乙酉揚州城破同菴先擕家避兵毗陵忽土人錢克承來訪詢之則曰子二年前夢見天榜免難江都蔣善居第一後同菴果以夀考終當塗楊璜字希周持已以正不詭隨人丙戌嵗兵擾其鄉璜戀祖父丘隴不忍去因匿妻妾與子於林中以身守隴兵見璜趨執之璜急投水兵捨去其子甫十嵗自林間見父溺亦號哭奔溺父子擕手而死妻陸氏感悼幾絶撫妾泣曰汝有遺腹子吾死誰為吾夫撫者遂不死自此每晨哭夫畢輒禮佛祈祝生男及嵗暮妾乃生女陸氏泣曰已矣無可復望矣族人咸欲分其産族長不忍議至小祥屆期親族集焉妾偶抱女卧女忽呱呱哭不已妾方夢魘陸來抱女溺啓視之則見其和處已易女為男矣大驚異急呼親族共視親族無不愕然因共聞於知縣張公張公使人驗之果然一時傳播以為異事此豈非忠良之報乎女不柔順婦人者伏於人者也若不柔順或至悍妒豈婦人之道乎唐張孟仁妻鄭氏其弟中義妻徐氏共處一室紡績寸不入私房有所饋則納於姑臨用則請之不問孰為己物鄭歸寧則徐乳其子徐歸寧則鄭乳其子朝廷旌其門曰二難近見人家婦女或挾制丈夫或不敬翁姑或妯娌不和或凌虐婢妾種種惡習雖女子質性之劣亦由男子有以養成之語云教婦初來教子幼孩凡為丈夫者須先事事諭之以理不可溺於床第之愛縱使失道尤不可輕信其言凡事令之專制至於女子未嫁者又在父母朝夕教誨切勿順其喜怒之性今日在家事父母即異日事舅姑丈夫之法今日在家待兄弟姊妹即異日待妯娌小姑之法今日在家使奴婢即異日馭婢妾之法少有過差便當委曲開導萬勿姑息容忍久之馴伏純熟德器若自然矣不和其室人之有妻便成家室夫妻和好家道未有不興隆者世有愚人或寵妾而侮妻或迷戀聲妓不受妻勸忿罵嗔責無所不至乖氣致戾所以然巳顏茂猷曰人生莫作婦人身百般苦樂由他人彼離親別愛所倚惟我我則薄幸耽情姬侍罔念結髮自揣於心忍乎恕乎即或婦有不是處當念彼未讀書明理唯委曲勸諭使之聽從何得遽生嗔怒且世人遇强悍之婦則受其欺凌遇醇朴之婦則加以凌虐欺善怕惡此豈丈夫所宜有也吾願世人有犯此者當為戒之劉廷式登第其所聘女已雙瞽矣女家力辭劉曰失明於定婚之後義不可棄若此女某不娶將何所歸爰擇吉成禮夫婦相敬如賔生二子皆成進士後瞽女死廷式哭之盡哀今以嫌妻貌醜而不和者盍視此劉思文流寓蜀中成都楊某納為壻既而謀歸竊見妻與母兄議事有不豫之色問其故曰父存日議以田四十畝為嫁資邇來事多鬻之幾盡今僅能一半適立劵為此不安也劉取劵焚之曰豈有為人壻而逼其家以為粧奩者竟携妻歸極其和好後登第官至侍郎今之爭競賠房而不和者盍視此不敬其夫夫者婦之天胡可不敬其不敬者非悍婦即淫蕩之婦也嗚呼凡作女身多因宿譴若更侮夫寧不益墮惡道乎每好矜誇矜者自是也人之謙者福澤必深厚其器量大也人之盈者福澤必減少其器量淺也况造物忌盈人道好謙矜誇太甚豈不犯天之忌干人之怒乎究其所為矜誇者不過恃其富貴才能抑思富貴才能有何足恃石崇與王愷鬬富誇恃奇麗愷作紫步障四十里崇作錦步障五十里其他珍異之物莫不爭勝後崇因罪伏誅乃嘆曰奴輩利吾財耳此富不足誇之證也杜鎬少年登第嘗與同輩遊一寺中老僧問其姓氏旁人遂以科名誇之老僧顧而笑曰皆不知也杜內愧其言因題詩曰家在城南杜曲旁兩枝丹桂一時芳禪師都未知名姓始覺空門意味長此貴不足誇之證也指揮湯允績有英才詩文亦雄健有氣然性殊傲慢好加於人嘗自言才兼文武可當一面人因以湯一面呼之後補陝西參將與賊交鋒一箭中喉而死人遂號曰湯一箭此才能不足誇之證也然則好矜誇者又將何所恃耶常行妒忌人之隱惡無如妒忌一萌此心便當克制乃必欲行之斷為鬼神所不容矣况常行乎昔宋大夫薛瑗有子十人一僂一跛一𤼣一躄一顚一癡一聾一瞽一啞一獄死公明子皋見之問曰大夫所行如何而禍至此瑗曰豫生平無他惡惟好行嫉妒勝己者忌之佞己者悅之聞人之善疑之聞人之惡信之見人有失己如有所得見人有得己如有所失子皋嘆曰大夫心行如此須至滅門矣惡類寧止此乎瑗聞其言惶然畏懼子皋曰天雖高而察甚下若改往修來轉禍為福不患晚矣瑗自此改惕盡返生平所行不數年諸子所疾皆愈由此觀之妒忌可常行乎玩上下文則此條似為婦人而無行於妻子妻者我之敵體子者我之後身待妻宜和而敬待子宜嚴而慈今之待其妻者或刻薄寡恩或狎昵無度今之待其子者或姑息太過或督責太苛皆謂之無行已實無行又將何以責妻子乎閩士李某赴試道過衢州店主夢土神告曰明日有李秀才來乃科甲中人可善待之及至主人欵待甚優且告以夢李甚喜夜思登第做官惟所娶妻不堪作夫人果貴不患無美者既去主人復夢曰李秀才功名未遂便欲棄妻名不成矣生回店主又以夢告之生驚愧而去此無行於妻之報也涿郡王瑤溺愛二子養成惡性後不能制而告官二子俱死於法後瑤死次年二月十五夜城隍廟道士劉進聞廟中聲喧起窺之見王瑤持狀求淸明祀神怒曰爾有子不能教自絶其後誰供爾祀不准其人大哭而去明日訪之乃知瑤已死此無行於子之報也失禮於舅姑舅姑俗呼翁婆也婦事舅姑一如子事父母少或失禮即為不孝罪通於天矣試以古之至孝者言之姜詩事母至孝妻龎氏奉姑尤謹姑好飮江水龎氏出汲遇風還遲姑因渴怒甚詩遂責妻遣之龎氏不忍去寄居鄰舍晝夜紡績日市珍羞使鄰母自以其意遺姑久之姑怪問鄰母以實告姑感而命還姑嗜魚膾又不能獨食夫妻力作以供呼鄰母共之其後舍側忽湧甘泉味如江水日躍雙鯉以供其膳赤眉賊經詩里疾馳而過曰驚大孝必觸鬼神吾輩何敢朝廷聞其孝拜詩為郎中噫婦之於舅姑以人合者也子之於父母以天合者也從來未有子不孝父母而婦能獨孝公姑之理故凡婦之失禮皆其子有以致之也天神降罰豈能盡責之婦人乎願為子者念之輕慢先靈先靈祖先之靈也凡殯殮無禮居喪違制安葬不速齊祭不誠拜掃不勤皆為輕慢而停柩不葬尤輕慢之大者羅鞏遊太學以前程禱於神夜夢神告曰子父母久不葬已得罪於冥安問功名鞏曰某尚有兄何獨受罪神曰子為儒者明知禮義子兄碌碌不足責也是年果卒朱璣曰古葬禮大夫三月士踰月故不葬則不變服易食哀親之未有歸也今人惑於風水之說有貪求吉地遷延日久者有既葬多疑屢行啓掘者不思古人卜地之義惟是孝子慈孫重親遺體不為風水所侵不為蟲蟻所蝕不為耕犂所及他日不為道路不為城郭溝池如是足巳豈以親之骸骨為子孫福利之具哉則風水不必貪也又有惑於分房之說兄弟議多終年牽制既擇年月日時又疑山水偏向則是父母多生一子反增一日之暴露矣豈知人之禍福各有因緣於山水何與則分房不必執也倘若執迷不悟一遇利名牽逐淹滯他鄉年復一年幾無安土之望或遭水火又有焚溺之虞為人子者獨能帖然於心乎又權厝一事萬不可久久則雨水侵淋日氣下蒸未及歸土木已腐矣仁人孝子亦當念之違逆上命上命如君命臣父命子將帥命士卒官長命子民家長命僕役之類理所宜遵固當從命即所命未當亦須委曲諷諫便合道理安可違逆違逆之罪當與不忠不孝等矣林景度為給事時蜀郡荒旱朝廷命發十萬米賑濟景度以米數太多蜀道難行封還成命朝廷遂以一半賑之是夜夢朱衣人持天符至曰上帝有敕謂汝逆㫖害民有滅絶子孫之禍即驚悸而醒自此不安以病免官行至福州卒二子年餘繼殁門戶遂絶違逆上命不必皆如此事此特舉其事之大者餘可類而推也作為無益世間萬事轉頭即空惟有興利除害等事生生世世所獲福報無有窮已如有德能者闡繹經傳修輯方書有財勢者修井築堤造橋補路置社倉立義塜皆是有益於人之事有益於人則亦有益於已矣若夫宫館臺池之費以及一切文字珍奇之玩皆足喪志纍身何益之有陳恭公於潤州造一大第皆用文梓為梁花石鋪砌極其精華第成而公已病但得肩輿一登西樓而已遂卒人因名其第為三不得謂居不得修不得賣不得云後果獻之於官日久頽廢此工作之無益者黃魯直好為豔詞人爭傳之法雲秀老屢誡黃曰空語無妨秀曰李伯時但以念想在馬腹遂至墮落公豔語滿天下使人冒犯亷恥踰越禮法何止入馬腹死當入泥犁此文字之無益者張纘孫為書誡人作淫詞甚中時病附載其略云今世文字之禍百怪俱興往往倡淫穢之詞撰造小說以為風流佳話使觀者魂搖色奪毁性易心其意不過網取蠅頭耳在有識者因知為海市蜃樓寓言幻影其如天下高明特達者少隨俗波靡者多彼見當時文人才士已儼然筆之為書昭布天下則閨房醜行未嘗不為文人才士之所訐平日天良一線或猶畏鬼畏人至此則公然心雄膽潑矣若夫幼男童女血氣未定見此等詞說必至鑿破混沌拋捨軀命小則滅身大則滅家嗚呼誰實使之然耶况吾輩既已含齒戴髮更復列身士林不思遏之禁之何忍驅迫齊民盡入禽獸一路哉禍天下而害人心莫此之甚已倘謂四壁相如不妨長門賣賦則何不取古今來忠孝節義之事編為稗官野史未嘗不可騁才未嘗不可射利何苦必欲為此况矢口定是佳人才子密約偷期絶不新奇頗為落套而况綺語為殃虛言折福不獨誤人兼亦自誤吾實為作者危之惜之故不憚與天下共質之也懷挾外心臣有外心則必欺君子有外心則必遺親妻有外心則必背夫兄弟有外心必至相賊朋友有外心必至相傾即人不知我神鬼已陰瞰之矣處士朱貞曰世人常言不欺神明吾謂不欺心即不欺神也彼懷挾外心者將誰欺欺天乎自咒咒他咒咀一事篇中屢言之干求不遂便生咒恨是慚愧而咒罵他人也咒咀求直是忿激而洗白自己也自咒咒他是怒而自咒又兼咒他人也凶悖若此豈無顯報堰典妻嘗與人私又竊鄰家一手巾鄰家詬罵典乃咒曰我妻果與人私及竊汝巾當為雷擊否則汝亦如之未幾果斃於雷斧典脅下有字曰癡人保妻妻脅下亦有字曰行姦為盜此自咒咒他之報也偏憎偏愛人之可憎者或有一端好處偏憎則併其好處而廢之矣人之可愛者亦或有一端不是處偏愛則併其不是處而掩之矣愛憎一偏是非倒置因而生釁長亂往往有之嘗見人家兄弟相仇至於破家敗産者其始皆由於父母偏愛偏憎彼見愛者必揚揚得意見憎者必鬱鬱不舒積久遂成仇恨是父母之偏愛非真愛之乃所以害之也苟父母均所愛兄弟自相和睦豈不兩全亦有手足情深不因愛憎之偏而生隙者昔王祥弟覽為繼母朱氏所生朱氏愛所生而憎祥然祥愈孝母覽亦敬兄祥被楚撻覽輒涕泣抱持或以非理使祥覽輒與祥共作又虐使祥妻覽令妻亦趨而共之朱氏緣此遂大感悟噫偏愛偏憎為人上者固不宜有此而王祥兄弟以不私愛憎終至格親為人下者則又何可以不法也舉此一端他可類及越井越竈越跨越也井之利濟甚廣必有神以司之語曰臨井勿窺又曰古井不可唾窺與唾且不可况可跨越竈居五祀之一為人一家之主元元道君曰奉吾道者醮祭家竈及祀拜先亡之外不得淫祀他鬼然則人之於竈也可越乎不可越乎是以吳湛編護井泉得證道果陰子方䖍祀竈神驟至大富崇敬者得福若此則觸穢者獲罪可知矣觸穢井竈不但跨越如坐井欄及以足踏竈門皆觸穢也不可不戒跳食跳人跳者跨之過也食者民之天䙝而玩之是䙝天矣至人有富貴貧賤雖勢位不同但得為人則皆一也其可跳乎故凡遇人卧床著地皆當迂道過之翟林與正叔先生假宿僧舍坐處偶背聖像先生曰轉椅勿背林曰何耶先生曰凡具人形貌皆不當慢况聖像乎龜山聞而大賞其語今之以人為戲者烏能曉之損子墮胎物命至微尚體天地之心放生戒殺况乎子女乃世之愚民或以野合淫奔而欲滅其迹或以家産不厚而厭其多生於是有既生而損者有未生而墮者罪深業重莫甚於此不聞元秀之事乎梓潼帝君救劫章有云元秀家財四十萬有子四人其餘諸妾所生並瘞埋之一日夢中見十數輩來追殺人賊秀大驚起兩手兩足已為牛蹄展轉於牀大呌三日頭斷而死陰府申奏天曹帝大怒曰性根不壞方得人身天神誦章方離母腹愚人不禁情欲嬰兒有何罪愆揆以正條倍於故殺殺人償命理所當然牒下陰府將元秀永囚地獄在生四子注籍刑名四十萬家財沒入官府近又特差北方飛天神王巡行天下有似此者即許便宜施行不待事終赴十獄考鞫則損子與墮胎豈非天地神明所共痛惡者乎又世俗以養女為賠錢貨溺死盆中者甚多何龍圖因作歌戒世略曰虎狼雖至毒猶知有父子人為萬物靈奈何不如彼生男與生女懷抱一而已生男既收養生女胡不舉我聞殺女時其苦狀難比胞血尚淋漓有口不能語咿嚶盆水中良久乃得死吁嗟父母心殘忍一至此我因勸我民母為殺其女荆叉與裙布未必遂貧女隨分而嫁娶男女俱得所此歌散民間萬民當記取行多隱僻隱僻非止一事如姦盜邪淫之類凡不可使天知不可對人言者皆是也而姦人妻女與害人功名兩者為重至兩者相較則又以淫人妻女為尤重蓋淫人妻女瀆倫亂種損德最甚故不憚反復為世人告之昔李登年十八魁鄉薦自謂狀元及第不足為難乃屢上公車皆不遇聞葉法靖有道行往叩之踰數日葉告登曰汝初生時上帝賜以玉印年十八魁鄉薦十九作狀元五十三作宰輔因汝鄉薦後窺鄰女張燕娘事雖未諧而繫其父張澄於獄以此罪展十年降第二甲後隱占兄李豐屋基至形於訟以此罪又展十年降第三甲後長安寓中淫一良家婦鄭氏以此罪又展十年降第四甲後又盜鄰女王慶娘上帝謂汝為惡不改已將福籍削盡死在旦夕何望登第登聞其語一夕愧憤死噫觀此一事則知一切詭祕之行終有發露之時欲蓋彌彰事無不敗戒之哉晦臘歌舞晦者一月之盡月大三十月小草九乃司命竈君上言功過之期臘者一歲之盡即除夕之日也其日上下諸神考校生人善惡以定罪福人遇此等時皆當修省宿愆倍加警懼豈宜歌舞一曰臘五臘也正月初一為天臘五月初五為地臘七月初七為道德臘十月初十為嵗臘十二月遇臘為侯王臘此五日先靈眷屬皆得歸家領受享祀按此則亦不當歌舞之日朔旦號怒朔者每月之初一日也旦者每日之早晨也朔為一月之首旦為一日之首一月之所為基於朔一日之所為基於旦若號與怒則濁氣隨肝而升真氣隨聲而散於是神昏氣濁善念不生矣佛經云嗔是失諸善法之根本墮諸惡道之因緣當急棄之毋令增長是號怒平日亦當謹戒况朔旦乎對北唾涕及溺北方乃北斗星君所居北極為天之樞三界十方百靈衆真皆所統屬是則中天斗極號為至尊而至尊之所又何可觸穢若以長生經言之所謂北者又不止正北凡春東夏南秋西冬北月建所指皆為犯北斗柄切須避之對竈吟咏及哭吟咏即歌唱也黃帝竈經曰竈門不得歌咏哭泣咒罵呌喊與此篇所言一也今人在官府之前尚不敢高聲妄語况竈為司命之神乃敢對之吟咏及哭寧無䙝瀆之罪乎又以竈火燒香香必潔淨方可供神倘竈有穢柴以之燒香則不䖍甚矣按天師門下科令竈下灰火謂之伏龍屎是故不可燒香披閲教典香火避忌又不止此一事如油漬紙撚不可爇紙供養真武夏不可用李子冬不可用石榴延降上真不可燒乳頭香檀香謂之浴香月季謂之不時花金桐謂之鬼花皆當避忌穢柴作食柴雖下爨氣實上蒸穢柴不淨厭濁之氣觸犯竈神是故不可作食也夜起裸露裸露赤體也晝屬陽夜屬陰夜即百靈交會之時不欲人裸露者恐冒犯也八節行刑立春春分立夏夏至立秋秋分立冬冬至謂之八節凡遇節則諸神會集開度羣䝉條録罪福是日宜淸淨和平習吉除凶惡與序更善隨時進仰答天地之生成可耳無論殺戮即鞭笞亦所不可服官居家皆宜謹戒何比干字少卿初為汝陰獄吏每至八節之日百端哀懇縣令從重減輕從輕減免全活甚多後為丹陽縣令獄無𡨚囚至於八節良辰設法矜恤有罪之人民皆稱為何父一日老媪至門曰君家世有陰德君又治獄平怨上天賜策以廣君子孫因舉策授之凡九百餘葉曰子孫佩印綬者當如此數後果世榮貴皆如媪言此八節免刑之報也上淸真人曰八節之日皆當謀諸善事不可恚怒忿爭此㫖天人大忌獲罪非小夫恚怒且不可况行刑乎唾流星流星即奔星也世俗愚人乃妄指之為妖往往以唾為解不知奔流非妖妖實自召惟當恐懼修省急修所以禳解之德其可輒唾指虹霓赤白色曰虹青白色曰霓虹霓者斗星餘氣昔孔子孝經既成齊戒向北斗自陳所以著書之意忽有赤虹自天而下化為黃玉刻文孔子跪而受之孰謂虹霓而可指乎輒指三光日月星為三光指之是不敬也昔晉陵大旱郡守曾公祈禱甚䖍夢神告曰明辰有一老人挾傘進西門城逼之以禱必應其異處只在一傘耳昧旦遣人伺之果得公延以隆禮懇其祈禱老者悚懼辭謝公告以夢老者不得已赴壇焚香告天誓三日不雨願就火焚四圍積薪以俟至三日天忽大雨頃刻水深尺許公禮謝之因問老者一傘有何異處老人曰愚民今年八十生平唯敬天地三光所挾一傘遇出路便溺張以護身使不穢觸三光耳公厚贈之不受而去久視日月記曰子之事父臣之事君垂首鞫躬無敢仰視觀此則知久視為不敬也况日為太陽之宫月為太陰之宫代天司照其位尤尊何可久視道藏中教人每年二月初一日祀日八月十五日祀月今世俗則止祀月春日燎獵燎獵者焚林而獵也獵之所殺有數燎獵則所殺無窮彼射飛逐走太上且有明戒况燎獵乎獨言春日者春為萬物發生之候縱獵不已已傷生生之仁乃復以縱之火則草木由之而枯焦百蟄因之而煨燼是天方生之我輒戕之罪斯大矣高陽許憲為餘杭縣令其子獵於仇王廟側忽有三白麞從屋後出遂引弓而射忽失所在復以火圍之風吹火滅反燒其面而死此其報也對北惡罵唾涕特細事耳獨以對北猶為罪愆况於惡罵愚人忿心所使一時不暇顧看或對北怒罵者有之不知戾氣惡聲觸犯實甚我怒欲泄神怒如何昔管寧偶晨起對北櫛髮忽瞿然曰北辰至尊所居何可䙝犯深自引咎若無可容古人對北敬愼如此尚有惡罵之事乎無故殺龜打蛇應世真人曰一切物命皆不可殺而龜蛇陰精應北方玄武之宿尤不可殺若無故殺之必罹慘報是以仁者常切救護劉彥回以放龜而脫水厄孫真人以救蛇而獲仙方古來放龜蛇者往往有奇報其為神物可知已如是等罪司命隨其輕重奪其紀算算盡則死死有餘責乃殃及子孫如是等罪總結上文之詞自非義而動以至殺龜打蛇皆是輕重二字有一篇總較之輕重有逐句細分之輕重如暗侮君親與抵觸父兄較則暗侮輕抵觸重也就暗侮一句中論之則暗侮日有重自有輕也隨其輕重奪其紀算即前文如影隨形之義死有餘責殃及子孫所謂積不善之家必有餘殃是也夫上帝好生即草木禽魚尚不忍其滅息何况人為萬物之靈乃欲殃其子孫然欲懲惡以勸善不得不然梓潼帝君詩云妙藥難醫𡨚債病橫財不富命窮人虧心折盡平生福行短天教一世貧生事事生君莫願害人人害汝休嗔從來天地無差報不在身兮在子孫此非殃及子孫之意乎亦有現報者秀水屠戶潘騏肆惡橫行無業不造一日死而復蘇呼妻子告曰吾死至地獄見閻君閻君言善惡之報陰府顯然毫釐不爽死者受報生者不知良由陰陽道隔無從曉諭以故受者方苦作者熾然即輪回報應之說尚多疑而未信深可悲憫今潘騏罪業已極著令暫返陽間假此一人以警萬衆遂操刀自割其陰曰此吾宣淫之報自斫手足曰此吾屠宰殺生之報自剖腹剜心提出臟腑曰此吾陰險殘賊種種害人之報遠近喧傳觀者萬衆言訖而死又諸橫取人財者乃計其妻子家口以當之漸至死喪若不死喪則有水火盜賊遺亡器物疾病口舌諸事以當妄取之直上文既明隨時受報而此節又特取貪財者言之見此罪為易犯也以威勢逼取曰橫直謂原數當直謂恰合原取之數也夫橫取人財者多謂妻子家口計不思司命正計其妻子家口以報貪惡則利之適所以害之耳佛說人生産業嘗為五家負之而去一曰國王二曰水三曰火四曰盜賊五曰不肖子今太上所舉耗端又多遺亡疾病口舌三種則其所以折罰人者其途不益廣乎孫奮為扶風郡掾尅取民財遂至巨富大將軍聞其富索白珠十斛紫金三千兩不與坐以叛逆抄沒資産迸逮家口相繼滅絶此妻子家口漸至死喪者也韋公幹知瓊州瓊多奇木公幹驅匠採伐鞭撻橫施及離任具二大舟盡載奇木雜以金銀浮海而歸行未百里二舟具沒此以水災折之者吕師造為池州剌史剽竊公帑侵漁百姓厚載而歸舟泊竹篠忽見一物躍入舟中火即隨發一舟之物皆成煨燼此以火災折之者丁謂貶朱崖至龍門南彭婆店忽遇巨盜盡劫所有此以盜賊折之者馬襄為西川漕劉旴之亂倉皇間親持五十兩大銀十錠沉井中亂定取不可得此以遺亡器物折之者金昱三世患癩醫藥不效聞何奎有道術往問之奎曰汝家必有他人功德在家作耗昱歸問母母曰佛前紗窗乃圍城中所得急撤起醮祭遣之病果愈此以疾病折之者劉治奉命點盤蜀宫恣意掠取一時謗議騰沸及解職乃自請押綱希圖塞謗至新都為羅令璠脅取而去此以口舌折之者厯觀諸報厯厯不爽當其幸得豈料及此而冥冥之中必有不肯少貸者人亦何為迷而不悟乎又枉殺人者是易刀兵而相殺也此節又申明殺人之報以見陰府之罪最重殺人也人以一言相犯一掌相加必思報復無已况於枉殺人者乎枉殺之事不一而其所易犯者如將不約束用兵枉殺吏不愼刑𡨚獄枉殺醫不審病用藥枉殺人不寡欲墮胎枉殺甚至因一時之怒一言之讒無故枉殺一還一報𡨚對分明雖曰殺人實以自殺故曰易刀兵而相殺也諸枉殺之報前巳間列於前矣惟醫藥一事未之及茲補載之以示鑒戒可也劉大初醫薛司法妻差誤致死後數年白晝有一婦人䝉首至其家口稱某人妻就醫劉偶他出家人辭去劉歸遇諸途敘前病症數劉用藥之誤劉驚駭汗出回家而死嗚呼今之以醫殺人者所在皆有特未遇厲鬼如司法妻者耳遂可謂𡨚對已盡釋乎又當塗徐外科醫富人江舜明背瘡索其謝已許三百金矣攻療旬日法當潰膿徐欲得謝復以藥紙撚插入江呼痛苦徐曰付我謝金痛乃可止江子怒不與反復爭論乃許其半時紙撚已入一更矣乃拔出血湧如泉遂死江子訴於官徐受刑將斃行賄免焉未幾徐病呌苦不絶聲但云江舜明莫打我我固不是令郎亦殊誤事如此數日乃死夫技術不精猶云誤殺乘危妄索豈非故傷外科賺財不遂往往移輕作重使之决裂而徐收其功亦烏知陰報之已隨其後也亦愚矣哉取非義之財者譬如漏脯救飢鴆酒止渴非不暫飽死亦及之此節又申明貪利之害以世人好利心重故反復申明也財非己有以計奪之以術誆之皆為非義較之上文一味橫取者雖少有不同然律以亷正總屬貪叨未有不致禍者世人利令智昏始既不顧是非繼且不顧利害往往忘身殉利自取速死非好死也好利也譬如肉中有蠱酒中有毒方其嗜之何知傷生之速乎然而死必及之從無一人幸免者可嘆也胡嘉棟曰今世縉紳居鄉者多以請託媒利且云脫人刑獄受金何傷成人功名取利非枉不知刑賞國之大法我以片語尺牘顚倒是非使有罪者幸免則無辜者必含𡨚無學者幸進則有才者必被枉抑人情好惡之公奪天道禍福之柄真衣冠之大盜名教之罪人也以此取利而謂可以遺子孫計長久又何異認漏脯鴆酒為長生之藥也哉劉夢震曰屋漏水滴脯上名為漏脯有毒能殺人鴆酒是鴆鳥羽入酒飲之則死以此鳥食蛇腹有毒也夫心起於善善雖未為而吉神已隨之或心起於惡惡雖未為而凶神已隨之此節又總論善惡之幾欲人知所謹也凡人一切善惡皆起於心心起一念善則羣邪撲滅惡則三途現前故吉神凶神隨念隨至何煩一毫等待乎江陰南門軍張旺嘗夜盜城西田父菜被執濡首厠中遂懷恨一夕匿火往燒之道經官溝有畫師吳碧山未寢聞步履聲窺見旺有惡鬼數十尾之頃又聞履聲窺旺回有靑衣童男前導明日叩旺旺曰我初欲燬其室忽念𡨚𡨚相報將無已時故止不意有鬼隨行如此即棄俗出家此與元自實之事正相同大抵意有所向即是已露天人相感各以類應理固如此斷不誣也中誡經曰心口意語鬼聞人聲邵康節曰人之善惡形於言發於事人得而知之但萌於心發於慮鬼神得而知之是以君子於起念之際常切檢點檢點既純斯有善無惡矣昔趙康靖公常置瓶豆於几案間每一念起必隨善惡以豆別之善則投一白豆於瓶惡則投一黑豆於瓶初則黑豆甚多既而漸少久而善惡二念俱忘瓶豆亦置而不用此真修意之善則也玩一或字有不入於此則入於彼之義其有曾行惡事後自改悔諸惡莫作衆善奉行久久必獲吉慶所謂轉禍為福也此節因上文而示人以禍福之幾欲人知改過也蓋善惡初分則一念之起亦可招報改悔自我雖已行之事猶可轉移誰謂吉凶禍福皆有定數乎夫數定者天命也感應者天心也天心既格則天命自隨之而轉矣阿耶律本一巨盜夜至佛寺見佛燈欲滅拔劍挑之燈忽大明即日竦然改惡從善後竟得道朱㹠亦一大盜事敗入終南山日夜懺悔真人馮君憐之授以道要修之不怠竟得輕舉以盜與仙佛較之相去不止霄壞也乃一日回頭皆可得道則改悔一途豈非至便之法門乎然太上便恐人誤認放下屠刀立地成佛二語妄想以一杯水救車薪之火故又誡曰諸惡莫作衆善奉行諸惡莫作望其刮磨淨盡也衆善奉行欲其積纍成功也行之久而又久方得贖前罪而轉禍為福今之愚懵自知所作不善請仗僧道宣禮懴文以圖釋罪是真欲以杯水救車薪也豈不惑哉故吉人語善視善行善一日有三善三年天必降之福凶人語惡視惡行惡一日有三惡三年天必降之禍此節承上文而復言感應之必然欲人知所決也蓋行善之久必獲慶則作惡之久必獲凶約以三年是其候也吉人即善人凶人即惡人不言善惡言吉凶者以其為善即是福為惡即是禍也語善如非禮之言不言樂道人之善開發人之善心是也視善如不視非禮之色樂見賢人樂觀善書是也行善如足不踐非禮之地為善不遺餘力倡引一方善與人同是也惡則反是三年千日也三年不改變則終身可知福如篇首所言人敬天祐之類禍如篇首所言貧耗憂患之類降福降禍即必之於三年之中殆所云無不自己求之也大抵無善不福無惡不禍者天道之常而善惡之報有在其身者亦有在其子孫者亦有因禍而得福因福而得禍者故曰陽憲速而可逃陰憲遲而不漏今人偶行一善便欲獲報少不如意則曰天道難知豈知人但不飢不寒無災無害士得讀書農得耕田時開笑口日少蹙眉即此便是平安之福不然人欲無涯世界缺陷安得人人富貴利達哉世人惟尊奉此篇隨事力行盡其在已禍福聽天可也三善三惡皆以語為第一可見人生造業口過居多即如篇中所載誑諸無識謗諸同學攻訐宗親訕謗聖賢形人之醜訐人之私干求不遂便生咒恨見他失便便說他過見他體相不具而笑之見他才能可稱而抑之怨天尤人呵風罵雨口是心非造作惡語讒毁平人毁人稱直罵神稱正指天地以證鄙懷引神明而鑑猥事咒咀求直每好矜誇自咒咒他晦臘歌舞朔旦號怒對竈吟咏及哭對北惡罵如是等罪皆口過也噫昔嚴君平委曲諭人以善立證仙階葛孝先與人好說好話而聞道度世為善之功亦何嘗無藉於語言人縱不能以語言作福奈何徒以口舌造業哉胡不勉而行之此一句總結全篇見篇中千言萬語到底無有別意只是要人行善也胡不二字承上文降福降禍之說而來若云人縱不願行善獨不願受福乎深訝之也勉字有警人力行之意蓋自然而然惟善根深者方能如此世間善根深者能有幾人惟是勉强力行庶幾有得書曰非知之艱行之惟艱華嚴經曰如人善美饌自餓而不食於法不力行多聞亦不是元始天尊曰我今說經止救末劫若能遵行此道則雖疑惑誹謗猶信也若不遵行此道則雖齊戒敬誦猶不信也噫三教聖人之言可謂深切著明矣周穀城曰讀感應篇者須知六除五發之說一除自恃念凡人塵習紛擾自謂寡過不知尋常舉動少一檢點罪戾叢集豈可自恃終日乾乾自攻其惡此除之之法也二除謂避念學期主敬畏欲非畏理也畏難思退暴棄孰甚焉勿憚檢察為煩勿視約束為苦力行既久自樂此不疲矣三除因循念語云勸人須下無情口學者除舊自新亦須下無情手如理亂鋼刀立斷何煩猶豫乎四除好名念為善得名者增一名亦損一善俗稱善曰陰德言不是人知也可信節昭昭墮行冥冥乎五除徼福念學者入道原當修身以俟命分心求效善力便減若有所求而為之將無所求而不為乎故知因善求福善福皆虛六除間斷念善念不紀與無善等古人云吉人為善惟日不足斷未有中道而自畫者也六念既除五心斯發除自恃念則發謙心除畏避念則發信心除因循念則發勇心除好名徼福念則發誠心除間斷念則發不已心如此而不獲契於太上者吾未之聞也勉行者宜知之先曾大父通奉公生平䖍奉感應篇手書行世不下數十本嘗謂古今勸善之書無有踰於感應篇者茲集注一篇乃任宮詹時偕澤州陳文貞公捐資付梓嵗久板片無存余家舊藏是冊因急授剞人以承先志以公同好云時乾隆五十一年丙午三月朔日海昌查瑩謹跋
